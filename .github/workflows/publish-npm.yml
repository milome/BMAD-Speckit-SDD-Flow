name: Publish npm

on:
  workflow_dispatch:
    inputs:
      package_target:
        description: Package to publish to npmjs.org
        required: true
        type: choice
        default: root
        options:
          - root
          - bmad-speckit
      npm_tag:
        description: npm dist-tag
        required: true
        default: latest
        type: string
      dry_run:
        description: Use npm publish --dry-run instead of a real publish
        required: true
        default: true
        type: boolean

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      NPM_REGISTRY: https://registry.npmjs.org
      NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm ci

      - name: Verify npm auth on npmjs.org
        run: npm whoami --registry="$NPM_REGISTRY"

      - name: Pack selected publish artifact
        env:
          PACKAGE_TARGET: ${{ inputs.package_target }}
        run: |
          mkdir -p .artifacts/npm

          if [ "$PACKAGE_TARGET" = "root" ]; then
            npm pack --json > .artifacts/npm/publish-pack.json
          else
            npm pack --json -w bmad-speckit > .artifacts/npm/publish-pack.json
          fi

          TGZ_NAME=$(node -e "const fs=require('fs');const pack=JSON.parse(fs.readFileSync('.artifacts/npm/publish-pack.json','utf8'));process.stdout.write(pack[0].filename)")
          TGZ_PATH=$(node -e "const fs=require('fs');const path=require('path');const pack=JSON.parse(fs.readFileSync('.artifacts/npm/publish-pack.json','utf8'));const candidates=[path.join(process.cwd(), pack[0].filename), path.join(process.cwd(), 'packages', 'bmad-speckit', pack[0].filename)];const hit=candidates.find((candidate)=>fs.existsSync(candidate));if(!hit){console.error(`Cannot locate ${pack[0].filename}`);process.exit(1);}process.stdout.write(hit);")
          mv "$TGZ_PATH" ".artifacts/npm/$TGZ_NAME"

      - name: Upload selected publish artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: npm-publish-${{ inputs.package_target }}-${{ github.run_id }}
          path: .artifacts/npm/

      - name: Publish root package to npmjs.org
        if: inputs.package_target == 'root'
        env:
          DRY_RUN: ${{ inputs.dry_run }}
          NPM_TAG: ${{ inputs.npm_tag }}
        run: |
          if [ "$DRY_RUN" = "true" ]; then
            npm publish --dry-run --tag "$NPM_TAG" --registry="$NPM_REGISTRY"
          else
            npm publish --tag "$NPM_TAG" --registry="$NPM_REGISTRY"
          fi

      - name: Publish bmad-speckit package to npmjs.org
        if: inputs.package_target == 'bmad-speckit'
        env:
          DRY_RUN: ${{ inputs.dry_run }}
          NPM_TAG: ${{ inputs.npm_tag }}
        run: |
          if [ "$DRY_RUN" = "true" ]; then
            npm publish -w bmad-speckit --dry-run --tag "$NPM_TAG" --registry="$NPM_REGISTRY"
          else
            npm publish -w bmad-speckit --tag "$NPM_TAG" --registry="$NPM_REGISTRY"
          fi
