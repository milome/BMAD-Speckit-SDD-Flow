name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install ripgrep
        run: sudo apt-get update && sudo apt-get install -y ripgrep

      - name: Install dependencies
        run: npm ci

      - name: Build scoring package
        run: npm run build:scoring

      - name: Build runtime-emit package (esbuild bundle from scripts/emit-runtime-policy.ts)
        run: npm run build:runtime-emit

      - name: Lint
        run: npm run lint

      - name: Generate governance mapping fixture
        run: npm run test:governance-fixtures

      - name: Validate Wave 2 schemas
        run: |
          python -m json.tool docs/reference/speckit-journey-ledger.schema.json > /dev/null
          python -m json.tool docs/reference/speckit-trace-map.schema.json > /dev/null
          python -m json.tool docs/reference/speckit-closure-note.schema.json > /dev/null

      - name: Validate Wave 2 CLI entrypoints
        run: |
          python _bmad/speckit/scripts/python/readiness_gate.py --help
          python _bmad/speckit/scripts/python/generate_smoke_skeleton.py --help
          python _bmad/speckit/scripts/python/ambiguity_linter.py --help

      - name: Readiness gate self-check
        run: |
          tmpdir="$(mktemp -d)"
          cp _bmad/speckit/scripts/templates/journey-ledger.template.json "$tmpdir/journey-ledger.json"
          cp _bmad/speckit/scripts/templates/trace-map.template.json "$tmpdir/trace-map.json"
          mkdir -p "$tmpdir/closure-notes"
          cp _bmad/speckit/scripts/templates/closure-note.template.md "$tmpdir/closure-notes/J01.md"
          python _bmad/speckit/scripts/python/readiness_gate.py \
            --journey-ledger "$tmpdir/journey-ledger.json" \
            --trace-map "$tmpdir/trace-map.json" \
            --artifact-root "$tmpdir"

      - name: Ambiguity linter self-check
        run: |
          python _bmad/speckit/scripts/python/ambiguity_linter.py \
            docs/reference/speckit-journey-ledger.schema.json \
            docs/reference/speckit-trace-map.schema.json

      - name: Smoke skeleton generation validation
        run: |
          tmpdir="$(mktemp -d)"
          python _bmad/speckit/scripts/python/generate_smoke_skeleton.py \
            --journey-ledger _bmad/speckit/scripts/templates/journey-ledger.template.json \
            --output-root "$tmpdir/smoke"
          find "$tmpdir/smoke" -name '*.smoke.spec.ts' -print -quit | grep -q .

      - name: Run smoke E2E when suite exists
        run: |
          if [ -d tests/e2e/smoke ] && find tests/e2e/smoke -type f | grep -q .; then
            npx playwright test tests/e2e/smoke
          else
            echo "No tests/e2e/smoke suite present; skipping real smoke E2E run."
          fi

      - name: Init Claude surface
        run: npm run init:claude

      - name: SpeCKit mirror sync test
        run: npm run test:speckit-mirror-sync

      - name: Vitest suite
        id: vitest
        continue-on-error: true
        run: npx vitest run

      - name: BMAD SpeCKit tests
        id: bmad_speckit
        continue-on-error: true
        run: npm run test:bmad-speckit

      - name: Main Agent release gate
        id: release_gate
        continue-on-error: true
        run: npm run main-agent:release-gate:ci

      - name: Main Agent quality gate
        id: quality_gate
        continue-on-error: true
        run: npm run main-agent:quality-gate

      - name: Main Agent chaos tests
        id: chaos
        continue-on-error: true
        run: npm run test:main-agent-chaos

      - name: Fail if any test segment failed
        if: always()
        run: |
          failed=0

          check_step() {
            name="$1"
            outcome="$2"

            if [ "$outcome" = "failure" ]; then
              echo "::error::$name failed"
              failed=1
            else
              echo "$name: $outcome"
            fi
          }

          check_step "Vitest suite" "${{ steps.vitest.outcome }}"
          check_step "BMAD SpeCKit tests" "${{ steps.bmad_speckit.outcome }}"
          check_step "Main Agent release gate" "${{ steps.release_gate.outcome }}"
          check_step "Main Agent quality gate" "${{ steps.quality_gate.outcome }}"
          check_step "Main Agent chaos tests" "${{ steps.chaos.outcome }}"

          exit "$failed"

  package:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci

      - name: Verify root publish chain on npmjs.org
        run: npm publish --dry-run --registry=https://registry.npmjs.org

      - name: Pack root tgz
        run: |
          mkdir -p .artifacts/npm
          npm pack --json > .artifacts/npm/root-pack.raw
          node scripts/extract-npm-pack-json.js .artifacts/npm/root-pack.raw .artifacts/npm/root-pack.json
          ROOT_TGZ=$(node -e "const fs=require('fs');const pack=JSON.parse(fs.readFileSync('.artifacts/npm/root-pack.json','utf8'));process.stdout.write(pack[0].filename)")
          mv "$ROOT_TGZ" ".artifacts/npm/$ROOT_TGZ"

      - name: Write npm package artifact manifest
        run: |
          node - <<'NODE'
          const fs = require('fs');
          const path = '.artifacts/npm';
          const summarize = (filename) => {
            const pack = JSON.parse(fs.readFileSync(filename, 'utf8'))[0];
            return {
              name: pack.name,
              version: pack.version,
              filename: pack.filename,
              size: pack.size,
              unpackedSize: pack.unpackedSize,
              shasum: pack.shasum,
            };
          };

          const manifest = {
            generatedAt: new Date().toISOString(),
            packages: {
              root: summarize(`${path}/root-pack.json`),
            },
          };

          fs.writeFileSync(`${path}/manifest.json`, JSON.stringify(manifest, null, 2));
          NODE

      - name: Upload npm tarball artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: npm-packages-${{ github.sha }}
          path: .artifacts/npm/
