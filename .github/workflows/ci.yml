name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build scoring package
        run: npm run build:scoring

      - name: Build runtime-emit package (esbuild bundle from scripts/emit-runtime-policy.ts)
        run: npm run build:runtime-emit

      - name: Lint
        run: npm run lint

      - name: Run tests
        run: npm run test:ci
