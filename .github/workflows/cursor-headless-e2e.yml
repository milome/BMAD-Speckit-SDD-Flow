name: Cursor Headless E2E

on:
  workflow_dispatch:
  push:
    branches: [main, master]

jobs:
  cursor-headless-e2e:
    if: ${{ secrets.CURSOR_API_KEY != '' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Cursor CLI
        run: |
          curl https://cursor.com/install -fsS | bash
          echo "$HOME/.cursor/bin" >> $GITHUB_PATH

      - name: Verify Cursor CLI
        run: |
          cursor --version
          cursor-agent --version || true

      - name: Run Cursor headless governance E2E
        env:
          CURSOR_API_KEY: ${{ secrets.CURSOR_API_KEY }}
          BMAD_RUN_CURSOR_HEADLESS_E2E: '1'
        run: npm run test:governance-cursor-headless-e2e
