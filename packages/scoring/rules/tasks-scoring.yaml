version: "1.0"
stage: tasks
link_stage: [tasks, implement]
link_环节: 1

weights:
  base:
    test_coverage: 35
    case_quality: 35
    regression_tests: 30

items:
  - id: task_executability
    ref: code-reviewer-config#test_coverage
    deduct: 10
  - id: acceptance_quality
    ref: code-reviewer-config#case_quality
    deduct: 8
  - id: regression_readiness
    ref: code-reviewer-config#regression_tests
    deduct: 8
  - id: journey_smoke_chain
    ref: code-reviewer-config#journey_smoke_chain_contract
    deduct: 8
  - id: journey_closure_task
    ref: code-reviewer-config#journey_closure_task_contract
    deduct: 6
  - id: journey_unlock_contract
    ref: code-reviewer-config#journey_unlock_contract
    deduct: 6
  - id: journey_gap_split_contract
    ref: code-reviewer-config#journey_gap_split_contract
    deduct: 6
  - id: shared_path_reference
    ref: code-reviewer-config#journey_shared_path_reference
    deduct: 4

veto_items:
  - id: veto_core_logic_error
    ref: code-reviewer-config#veto_core_logic
    consequence: stage_0_level_down
  - id: veto_compile_fail
    ref: code-reviewer-config#veto_compile
    consequence: stage_0_level_down
