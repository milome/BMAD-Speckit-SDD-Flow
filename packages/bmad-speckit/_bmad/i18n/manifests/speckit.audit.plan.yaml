id: speckit.audit.plan
version: 1
kind: audit_template
control:
  stage: plan
  output_contract: markdown_audit_report
  required_sections:
    - audit_scope
    - conclusion
  placeholders:
    epic: identifier
    story: identifier
  protected_tokens:
    - AUDIT_SCOPE
    - CONCLUSION
localization:
  default_language: zh
  allow_bilingual: true
anchors:
  audit_scope: AUDIT_SCOPE
  conclusion: CONCLUSION
strings:
  audit_scope_heading:
    zh: "审计范围（plan.md，Epic {{epic}} / Story {{story}}）"
    en: "Audit Scope (plan.md, Epic {{epic}} / Story {{story}})"
  audit_scope_body:
    zh: "本段对 plan.md 做实现方案审计；可解析块须含 AUDIT_SCOPE 锚点。"
    en: "This section audits plan.md; parseable blocks must include the AUDIT_SCOPE anchor."
  conclusion_heading:
    zh: "批判审计员结论"
    en: "Critical Auditor Conclusion"
  conclusion_body:
    zh: "总体评级: [A/B/C/D]\n维度评分须可解析；批判审计员须输出 CONCLUSION。"
    en: "Overall Grade: [A/B/C/D]\nDimension scores must be parseable; the Critical Auditor must emit CONCLUSION."
