<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 720">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#8b5a2b"/>
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.15"/>
    </filter>
  </defs>
  <style>
    .bg { fill: #f8f6f3; }
    .node { fill: #ffffff; stroke: #d4a574; stroke-width: 2; filter: url(#shadow); }
    .node-red { fill: #fef2f2; stroke: #dc2626; stroke-width: 2; filter: url(#shadow); }
    .node-green { fill: #f0fdf4; stroke: #16a34a; stroke-width: 2; filter: url(#shadow); }
    .text { font-family: system-ui, -apple-system, sans-serif; font-size: 13px; fill: #3d3d3d; text-anchor: middle; }
    .text-title { font-weight: 600; font-size: 14px; }
    .text-sub { font-size: 10px; fill: #6b6b6b; }
    .gate-label { font-size: 11px; font-weight: 600; fill: #8b5a2b; }
    .gate-label-green { font-size: 11px; font-weight: 600; fill: #16a34a; }
    .arrow-line { stroke: #8b5a2b; stroke-width: 2; fill: none; marker-end: url(#arrow); }
    .title { font-family: system-ui, -apple-system, sans-serif; font-size: 22px; font-weight: 600; fill: #3d3d3d; text-anchor: middle; }
  </style>
  <rect width="1100" height="720" class="bg"/>
  <text x="550" y="35" class="title">AI-TDD 六大心智模型与门禁流程</text>

  <!-- Row 1: Main Flow Nodes - wider spacing -->
  <rect x="30" y="70" width="140" height="70" rx="8" class="node"/>
  <text x="100" y="95" class="text text-title">需求确认</text>
  <text x="100" y="112" class="text text-sub">Requirement</text>
  <text x="100" y="125" class="text text-sub">Confirmation</text>

  <rect x="200" y="70" width="140" height="70" rx="8" class="node"/>
  <text x="270" y="95" class="text text-title">架构确认</text>
  <text x="270" y="112" class="text text-sub">Architecture</text>
  <text x="270" y="125" class="text text-sub">Confirmation</text>

  <rect x="370" y="70" width="140" height="70" rx="8" class="node-red"/>
  <text x="440" y="95" class="text text-title">实施准备</text>
  <text x="440" y="112" class="text text-sub">Implementation</text>
  <text x="440" y="125" class="text text-sub">Readiness</text>

  <rect x="540" y="70" width="140" height="70" rx="8" class="node"/>
  <text x="610" y="95" class="text text-title">执行闭合</text>
  <text x="610" y="112" class="text text-sub">Bounded Packet</text>
  <text x="610" y="125" class="text text-sub">Closure</text>

  <rect x="710" y="70" width="140" height="70" rx="8" class="node"/>
  <text x="780" y="95" class="text text-title">审计复核</text>
  <text x="780" y="112" class="text text-sub">Audit Review</text>
  <text x="780" y="125" class="text text-sub">多Agent批判</text>

  <rect x="880" y="70" width="140" height="70" rx="8" class="node-green"/>
  <text x="950" y="95" class="text text-title">交付确认</text>
  <text x="950" y="112" class="text text-sub">Delivery Closeout</text>

  <!-- Flow Arrows -->
  <line x1="170" y1="105" x2="200" y2="105" class="arrow-line"/>
  <line x1="340" y1="105" x2="370" y2="105" class="arrow-line"/>
  <line x1="510" y1="105" x2="540" y2="105" class="arrow-line"/>
  <line x1="680" y1="105" x2="710" y2="105" class="arrow-line"/>
  <line x1="850" y1="105" x2="880" y2="105" class="arrow-line"/>

  <!-- Gate Labels - positioned within bounds -->
  <text x="440" y="165" class="gate-label" style="font-size:12px;">准入门禁 (AI-TDD-RED)</text>
  <text x="950" y="165" class="gate-label-green" style="font-size:12px;">交付门禁 (AI-TDD-GREEN)</text>

  <!-- Detail Boxes - properly sized -->
  <rect x="30" y="185" width="240" height="125" rx="4" fill="#ffffff" stroke="#e5e5e5" stroke-width="1"/>
  <text x="150" y="205" class="text" style="font-weight:600;font-size:12px;">关键动作</text>
  <text x="45" y="225" class="text text-sub" style="text-anchor:start;">• 原子化需求拆解</text>
  <text x="45" y="242" class="text text-sub" style="text-anchor:start;">• 定义 MUST/NEG/OUT</text>
  <text x="45" y="259" class="text text-sub" style="text-anchor:start;">• 建立 TRACE rows</text>
  <text x="45" y="276" class="text text-sub" style="text-anchor:start;">• Human-in-loop确认</text>
  <text x="45" y="293" class="text text-sub" style="text-anchor:start;">• 生成需求确认页HTML</text>

  <rect x="300" y="185" width="240" height="125" rx="4" fill="#ffffff" stroke="#e5e5e5" stroke-width="1"/>
  <text x="420" y="205" class="text" style="font-weight:600;font-size:12px;">准出标准</text>
  <text x="315" y="225" class="text text-sub" style="text-anchor:start;">• 基于Manifest生成测试</text>
  <text x="315" y="242" class="text text-sub" style="text-anchor:start;">• 所有测试注册完成</text>
  <text x="315" y="259" class="text text-sub" style="text-anchor:start;">• 运行 CMD 门禁并收集 EVD</text>
  <text x="315" y="276" class="text text-sub" style="text-anchor:start;fill:#dc2626;">• 状态必须为AI-TDD-RED</text>
  <text x="315" y="293" class="text text-sub" style="text-anchor:start;">• Manifest完备性检查</text>

  <rect x="570" y="185" width="240" height="125" rx="4" fill="#ffffff" stroke="#e5e5e5" stroke-width="1"/>
  <text x="690" y="205" class="text" style="font-weight:600;font-size:12px;">关键动作</text>
  <text x="585" y="225" class="text text-sub" style="text-anchor:start;">• Manifest作为Prompt上下文</text>
  <text x="585" y="242" class="text text-sub" style="text-anchor:start;">• AI生成实现代码</text>
  <text x="585" y="259" class="text text-sub" style="text-anchor:start;">• 迭代直至测试通过</text>
  <text x="585" y="276" class="text text-sub" style="text-anchor:start;">• 多Agent批判审计</text>
  <text x="585" y="293" class="text text-sub" style="text-anchor:start;">• 避免实现漂移</text>

  <rect x="840" y="185" width="230" height="125" rx="4" fill="#ffffff" stroke="#e5e5e5" stroke-width="1"/>
  <text x="955" y="205" class="text" style="font-weight:600;font-size:12px;">准出标准</text>
  <text x="855" y="225" class="text text-sub" style="text-anchor:start;">• ACC/E2E 全部通过</text>
  <text x="855" y="242" class="text text-sub" style="text-anchor:start;">• EVD/ART 齐备</text>
  <text x="855" y="259" class="text text-sub" style="text-anchor:start;">• 生成交付确认页</text>
  <text x="855" y="276" class="text text-sub" style="text-anchor:start;fill:#16a34a;">• 状态必须为AI-TDD-GREEN</text>
  <text x="855" y="293" class="text text-sub" style="text-anchor:start;">• 人工最终审核通过</text>

  <!-- Dotted Lines -->
  <line x1="100" y1="140" x2="100" y2="185" stroke="#d4a574" stroke-width="1" stroke-dasharray="4,2"/>
  <line x1="440" y1="140" x2="440" y2="185" stroke="#dc2626" stroke-width="1" stroke-dasharray="4,2"/>
  <line x1="610" y1="140" x2="610" y2="185" stroke="#d4a574" stroke-width="1" stroke-dasharray="4,2"/>
  <line x1="950" y1="140" x2="950" y2="185" stroke="#16a34a" stroke-width="1" stroke-dasharray="4,2"/>

  <!-- Core Principles Box -->
  <rect x="30" y="330" width="1040" height="130" rx="6" fill="#ffffff" stroke="#e5e5e5" stroke-width="1"/>
  <text x="550" y="355" class="text" style="font-weight:600;font-size:16px;">AI-TDD 核心原则</text>
  <text x="50" y="385" class="text text-sub" style="text-anchor:start;">1. Manifest必须在执行开始前定义 MUST/NEG/OUT/TRACE/EVD</text>
  <text x="50" y="408" class="text text-sub" style="text-anchor:start;">2. 准入门禁必须AI-TDD-RED（全红）—— 测试存在但实现缺失</text>
  <text x="50" y="431" class="text text-sub" style="text-anchor:start;">3. 交付门禁必须AI-TDD-GREEN（全绿）—— 全部验证通过</text>
  <text x="50" y="454" class="text text-sub" style="text-anchor:start;">4. OUT 是范围边界；NEG 违反才阻断交付</text>

  <!-- Timeline -->
  <text x="550" y="515" class="text" style="font-weight:600;font-size:14px;">执行时序</text>
  <line x1="80" y1="535" x2="1020" y2="535" stroke="#d4a574" stroke-width="2"/>

  <circle cx="150" cy="535" r="6" fill="#d4a574"/>
  <text x="150" y="560" class="text" style="font-size:10px;">需求确认</text>

  <circle cx="320" cy="535" r="6" fill="#d4a574"/>
  <text x="320" y="560" class="text" style="font-size:10px;">架构确认</text>

  <circle cx="490" cy="535" r="6" fill="#dc2626"/>
  <text x="490" y="560" class="text" style="font-size:10px;fill:#dc2626;">准入门禁</text>

  <circle cx="660" cy="535" r="6" fill="#d4a574"/>
  <text x="660" y="560" class="text" style="font-size:10px;">执行闭合</text>

  <circle cx="830" cy="535" r="6" fill="#d4a574"/>
  <text x="830" y="560" class="text" style="font-size:10px;">审计复核</text>

  <circle cx="950" cy="535" r="6" fill="#16a34a"/>
  <text x="950" y="560" class="text" style="font-size:10px;fill:#16a34a;">交付门禁</text>

  <text x="550" y="610" class="text text-sub" style="font-size:11px;">Human-in-loop关键决策点：需求确认 → 架构确认 → 交付确认</text>
</svg>
