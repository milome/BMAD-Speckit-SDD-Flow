<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 720">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#8b5a2b"/>
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.15"/>
    </filter>
  </defs>
  <style>
    .bg { fill: #f8f6f3; }
    .node { fill: #ffffff; stroke: #d4a574; stroke-width: 2; filter: url(#shadow); }
    .node-must { fill: #fef2f2; stroke: #dc2626; stroke-width: 2; filter: url(#shadow); }
    .node-not { fill: #fff7ed; stroke: #ea580c; stroke-width: 2; filter: url(#shadow); }
    .node-evidence { fill: #f0fdf4; stroke: #16a34a; stroke-width: 2; filter: url(#shadow); }
    .node-trace { fill: #eff6ff; stroke: #2563eb; stroke-width: 2; filter: url(#shadow); }
    .text { font-family: system-ui, -apple-system, sans-serif; font-size: 12px; fill: #3d3d3d; text-anchor: middle; }
    .text-title { font-weight: 600; font-size: 13px; }
    .text-sub { font-size: 10px; fill: #6b6b6b; }
    .code { font-family: Consolas, Monaco, monospace; font-size: 9px; fill: #374151; text-anchor: start; }
    .arrow-line { stroke: #8b5a2b; stroke-width: 1.5; fill: none; marker-end: url(#arrow); }
    .title { font-family: system-ui, -apple-system, sans-serif; font-size: 20px; font-weight: 600; fill: #3d3d3d; text-anchor: middle; }
    .yaml-key { fill: #7c3aed; }
    .yaml-str { fill: #059669; }
    .yaml-id { fill: #2563eb; }
  </style>
  <rect width="1000" height="720" class="bg"/>
  <text x="500" y="30" class="title">AI-TDD Gate Manifest 结构解析</text>

  <!-- Root Node -->
  <rect x="400" y="50" width="200" height="40" rx="6" class="node"/>
  <text x="500" y="68" class="text text-title">implementationConfirmation</text>
  <text x="500" y="82" class="text text-sub">Root Contract</text>

  <!-- Level 2 Nodes -->
  <rect x="50" y="110" width="100" height="35" rx="6" class="node"/>
  <text x="100" y="125" class="text text-title" style="font-size:11px;">status</text>
  <text x="100" y="138" class="text text-sub" style="font-size:9px;">contract state</text>

  <rect x="170" y="110" width="90" height="35" rx="6" class="node-must"/>
  <text x="215" y="125" class="text text-title" style="font-size:11px;">must[]</text>
  <text x="215" y="138" class="text text-sub" style="font-size:9px;">requirements</text>

  <rect x="280" y="110" width="100" height="35" rx="6" class="node-not"/>
  <text x="330" y="125" class="text text-title" style="font-size:11px;">notDone[]</text>
  <text x="330" y="138" class="text text-sub" style="font-size:9px;">blockers</text>

  <rect x="400" y="110" width="100" height="35" rx="6" class="node-not"/>
  <text x="450" y="125" class="text text-title" style="font-size:11px;">mustNot[]</text>
  <text x="450" y="138" class="text text-sub" style="font-size:9px;">prohibitions</text>

  <rect x="520" y="110" width="100" height="35" rx="6" class="node-evidence"/>
  <text x="570" y="125" class="text text-title" style="font-size:11px;">evidence[]</text>
  <text x="570" y="138" class="text text-sub" style="font-size:9px;">proof items</text>

  <rect x="640" y="110" width="130" height="35" rx="6" class="node-trace"/>
  <text x="705" y="125" class="text text-title" style="font-size:11px;">traceRows[]</text>
  <text x="705" y="138" class="text text-sub" style="font-size:9px;">execution slice</text>

  <rect x="790" y="110" width="160" height="35" rx="6" class="node"/>
  <text x="870" y="125" class="text text-title" style="font-size:11px;">closeoutReadiness</text>
  <text x="870" y="138" class="text text-sub" style="font-size:9px;">delivery preview</text>

  <!-- Connections from root -->
  <line x1="440" y1="90" x2="100" y2="110" stroke="#8b5a2b" stroke-width="1"/>
  <line x1="460" y1="90" x2="215" y2="110" stroke="#8b5a2b" stroke-width="1"/>
  <line x1="480" y1="90" x2="330" y2="110" stroke="#8b5a2b" stroke-width="1"/>
  <line x1="500" y1="90" x2="450" y2="110" stroke="#8b5a2b" stroke-width="1"/>
  <line x1="520" y1="90" x2="570" y2="110" stroke="#8b5a2b" stroke-width="1"/>
  <line x1="540" y1="90" x2="705" y2="110" stroke="#8b5a2b" stroke-width="1"/>
  <line x1="560" y1="90" x2="870" y2="110" stroke="#8b5a2b" stroke-width="1"/>

  <!-- Trace Row Detail - Reduced height -->
  <rect x="670" y="170" width="280" height="160" rx="6" fill="#ffffff" stroke="#2563eb" stroke-width="2" filter="url(#shadow)"/>
  <text x="810" y="190" class="text text-title">traceRows Structure</text>

  <text x="690" y="210" class="code"><tspan class="yaml-key">- id:</tspan> <tspan class="yaml-id">TRACE-001</tspan></text>
  <text x="690" y="225" class="code"><tspan class="yaml-key">  covers:</tspan></text>
  <text x="690" y="237" class="code">    - <tspan class="yaml-id">MUST-001</tspan></text>
  <text x="690" y="249" class="code">    - <tspan class="yaml-id">NEG-001</tspan></text>
  <text x="690" y="264" class="code"><tspan class="yaml-key">  evidenceRefs:</tspan> [<tspan class="yaml-id">EVD-001</tspan>]</text>
  <text x="690" y="279" class="code"><tspan class="yaml-key">  contractGates:</tspan> [<tspan class="yaml-str">CMD-001</tspan>]</text>
  <text x="690" y="294" class="code"><tspan class="yaml-key">  deliveryGates:</tspan> [<tspan class="yaml-str">CMD-002</tspan>]</text>
  <text x="690" y="309" class="code"><tspan class="yaml-key">  acceptanceRefs:</tspan> [<tspan class="yaml-id">ACC-001</tspan>]</text>

  <!-- Must Detail -->
  <rect x="30" y="170" width="280" height="130" rx="6" fill="#ffffff" stroke="#dc2626" stroke-width="2" filter="url(#shadow)"/>
  <text x="170" y="190" class="text text-title">must Structure</text>

  <text x="50" y="212" class="code"><tspan class="yaml-key">- id:</tspan> <tspan class="yaml-id">MUST-001</tspan></text>
  <text x="50" y="227" class="code"><tspan class="yaml-key">  text:</tspan> <tspan class="yaml-str">"Expose manifest"</tspan></text>
  <text x="50" y="242" class="code"><tspan class="yaml-key">  validation:</tspan> <tspan class="yaml-str">"yaml exists"</tspan></text>
  <text x="50" y="257" class="code"><tspan class="yaml-key">  evidenceRefs:</tspan> [<tspan class="yaml-id">EVD-001</tspan>]</text>
  <text x="50" y="272" class="code"><tspan class="yaml-key">  coveredByTraceRows:</tspan> [<tspan class="yaml-id">T-001</tspan>]</text>

  <!-- Evidence Detail -->
  <rect x="30" y="320" width="280" height="110" rx="6" fill="#ffffff" stroke="#16a34a" stroke-width="2" filter="url(#shadow)"/>
  <text x="170" y="340" class="text text-title">evidence Structure</text>

  <text x="50" y="362" class="code"><tspan class="yaml-key">- id:</tspan> <tspan class="yaml-id">EVD-001</tspan></text>
  <text x="50" y="377" class="code"><tspan class="yaml-key">  type:</tspan> <tspan class="yaml-str">test-pass</tspan></text>
  <text x="50" y="392" class="code"><tspan class="yaml-key">  path:</tspan> <tspan class="yaml-str">tests/acceptance/...</tspan></text>
  <text x="50" y="407" class="code"><tspan class="yaml-key">  hash:</tspan> <tspan class="yaml-str">sha256:...</tspan></text>

  <!-- 5D Trace Matrix Concept - Adjusted layout -->
  <rect x="330" y="170" width="310" height="260" rx="6" fill="#ffffff" stroke="#7c3aed" stroke-width="2" filter="url(#shadow)"/>
  <text x="485" y="195" class="text text-title" fill="#7c3aed">五维追溯矩阵 (5D Trace)</text>

  <text x="350" y="220" class="text" style="text-anchor:start;font-weight:600;font-size:11px;">维度映射:</text>

  <rect x="350" y="232" width="270" height="35" rx="4" fill="#fef2f2" stroke="#dc2626" stroke-width="1"/>
  <text x="360" y="248" class="text" style="text-anchor:start;font-size:11px;">1️⃣ MUST - 需求承诺 (What)</text>
  <text x="360" y="260" class="text text-sub" style="text-anchor:start;font-size:9px;">业务方承诺必须实现的功能</text>

  <rect x="350" y="272" width="270" height="35" rx="4" fill="#eff6ff" stroke="#2563eb" stroke-width="1"/>
  <text x="360" y="288" class="text" style="text-anchor:start;font-size:11px;">2️⃣ TRACE - 执行切片 (How)</text>
  <text x="360" y="300" class="text text-sub" style="text-anchor:start;font-size:9px;">按序推进的任务追踪单元</text>

  <rect x="350" y="312" width="270" height="35" rx="4" fill="#f0fdf4" stroke="#16a34a" stroke-width="1"/>
  <text x="360" y="328" class="text" style="text-anchor:start;font-size:11px;">3️⃣ EVIDENCE - 验证证据 (Proof)</text>
  <text x="360" y="340" class="text text-sub" style="text-anchor:start;font-size:9px;">测试通过、审计报告的哈希</text>

  <rect x="350" y="352" width="270" height="35" rx="4" fill="#fff7ed" stroke="#ea580c" stroke-width="1"/>
  <text x="360" y="368" class="text" style="text-anchor:start;font-size:11px;">4️⃣ COMMAND - 执行命令 (Action)</text>
  <text x="360" y="380" class="text text-sub" style="text-anchor:start;font-size:9px;">可复现的验证命令与参数</text>

  <rect x="350" y="392" width="270" height="25" rx="4" fill="#faf5ff" stroke="#7c3aed" stroke-width="1"/>
  <text x="360" y="408" class="text" style="text-anchor:start;font-size:11px;">5️⃣ ARTIFACT - 交付物 (Output)</text>

  <!-- Key Insight - Adjusted -->
  <rect x="330" y="450" width="620" height="100" rx="6" fill="#faf5ff" stroke="#7c3aed" stroke-width="1"/>
  <text x="640" y="475" class="text" style="font-weight:600;font-size:13px;" fill="#7c3aed">核心设计原则</text>
  <text x="350" y="500" class="text" style="text-anchor:start;font-size:11px;">• <tspan font-weight="600">契约即代码</tspan>: Manifest是机器可读的需求契约</text>
  <text x="350" y="518" class="text" style="text-anchor:start;font-size:11px;">• <tspan font-weight="600">双向追溯</tspan>: 从需求到证据，从证据回需求</text>
  <text x="350" y="536" class="text" style="text-anchor:start;font-size:11px;">• <tspan font-weight="600">状态驱动</tspan>: TDD-RED (准入) → TDD-GREEN (交付)</text>

  <!-- Sample Trace Row at bottom -->
  <rect x="30" y="450" width="280" height="100" rx="6" fill="#f0f9ff" stroke="#0ea5e9" stroke-width="1"/>
  <text x="170" y="475" class="text text-title" style="font-size:12px;">示例: TRACE-001</text>
  <text x="45" y="495" class="text text-sub" style="text-anchor:start;font-size:9px;">covers: MUST-001, NEG-001</text>
  <text x="45" y="510" class="text text-sub" style="text-anchor:start;font-size:9px;">evidenceRefs: EVD-001</text>
  <text x="45" y="525" class="text text-sub" style="text-anchor:start;font-size:9px;">contractGates: CMD-TEST-001</text>
  <text x="45" y="540" class="text text-sub" style="text-anchor:start;font-size:9px;">deliveryGates: CMD-DELIVERY-001</text>

  <!-- Legend at bottom -->
  <rect x="30" y="570" width="940" height="60" rx="6" fill="#ffffff" stroke="#e5e5e5" stroke-width="1"/>
  <text x="50" y="590" class="text" style="text-anchor:start;font-weight:600;font-size:11px;">追溯规则:</text>
  <text x="50" y="608" class="text text-sub" style="text-anchor:start;font-size:10px;">正向: MUST → TRACE → COMMAND → ARTIFACT + EVIDENCE</text>
  <text x="500" y="608" class="text text-sub" style="text-anchor:start;font-size:10px;">反向: EVIDENCE → TRACE → MUST (反向审计)</text>
</svg>