<svg width="1600" height="640" viewBox="0 0 1600 640" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">BMAD-Speckit-SDD-Flow slogan banner</title>
  <desc id="desc">Think in Agents. Ship by Spec. A brand banner with concise positioning copy and a product badge emblem representing the AI delivery flow.</desc>
  <defs>
    <linearGradient id="bg" x1="120" y1="40" x2="1500" y2="620" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0D1117"/>
      <stop offset="0.56" stop-color="#111827"/>
      <stop offset="1" stop-color="#0F172A"/>
    </linearGradient>
    <radialGradient id="glowA" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(1270 150) rotate(90) scale(280 620)">
      <stop stop-color="#7C3AED" stop-opacity="0.16"/>
      <stop offset="1" stop-color="#7C3AED" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowB" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(260 560) rotate(90) scale(260 620)">
      <stop stop-color="#06B6D4" stop-opacity="0.10"/>
      <stop offset="1" stop-color="#06B6D4" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="accent" x1="980" y1="120" x2="1390" y2="460" gradientUnits="userSpaceOnUse">
      <stop stop-color="#22D3EE"/>
      <stop offset="0.5" stop-color="#818CF8"/>
      <stop offset="1" stop-color="#34D399"/>
    </linearGradient>
    <linearGradient id="accentSoft" x1="960" y1="136" x2="1408" y2="472" gradientUnits="userSpaceOnUse">
      <stop stop-color="#38BDF8" stop-opacity="0.22"/>
      <stop offset="0.55" stop-color="#A78BFA" stop-opacity="0.12"/>
      <stop offset="1" stop-color="#34D399" stop-opacity="0.18"/>
    </linearGradient>
    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feOffset dy="10"/>
      <feGaussianBlur stdDeviation="18" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="0 0 0 0 0.02 0 0 0 0 0.05 0 0 0 0 0.10 0 0 0 0.5 0"/>
      <feBlend in="SourceGraphic" mode="normal"/>
    </filter>
    <style>
      .eyebrow { font: 700 13px Inter, Segoe UI, Arial, sans-serif; letter-spacing: 0.18em; fill: #67E8F9; }
      .title { font: 700 58px Inter, Segoe UI, Arial, sans-serif; fill: #F8FAFC; letter-spacing: -0.03em; }
      .subtitle { font: 500 21px Inter, Segoe UI, Arial, sans-serif; fill: #94A3B8; }
      .tiny { font: 600 13px Inter, Segoe UI, Arial, sans-serif; fill: #64748B; letter-spacing: 0.1em; }
      .chip { font: 700 11px Inter, Segoe UI, Arial, sans-serif; letter-spacing: 0.16em; }
      .ring { fill: none; stroke-linecap: round; }
      .micro { font: 700 12px Inter, Segoe UI, Arial, sans-serif; fill: #E2E8F0; letter-spacing: 0.12em; }
    </style>
  </defs>

  <rect width="1600" height="640" rx="24" fill="url(#bg)"/>
  <rect width="1600" height="640" rx="24" fill="url(#glowA)"/>
  <rect width="1600" height="640" rx="24" fill="url(#glowB)"/>

  <g opacity="0.12">
    <circle cx="190" cy="92" r="2" fill="#38BDF8"/>
    <circle cx="308" cy="144" r="2" fill="#38BDF8"/>
    <circle cx="1418" cy="84" r="2" fill="#A78BFA"/>
    <circle cx="1362" cy="562" r="2" fill="#34D399"/>
  </g>

  <g filter="url(#shadow)">
    <rect x="1040" y="88" width="460" height="464" rx="28" fill="#0B1220"/>
    <rect x="1058" y="106" width="424" height="428" rx="24" fill="url(#accentSoft)" opacity="0.14"/>
  </g>

  <g>
    <text x="96" y="154" class="eyebrow">BMAD-SPECKIT-SDD-FLOW</text>
    <text x="96" y="246" class="title">Think in Agents.</text>
    <text x="96" y="314" class="title">Ship by Spec.</text>
    <text x="96" y="372" class="subtitle">Open-source AI delivery workflow. Structured planning, audited execution, human-reviewed shipping.</text>
    <text x="96" y="422" class="tiny">BUILT ON BMAD METHOD + SPEC-DRIVEN DEVELOPMENT</text>
  </g>

  <g transform="translate(1281 320)">
    <circle r="126" fill="none" stroke="#1E293B" stroke-width="2"/>
    <circle r="126" class="ring" stroke="url(#accent)" stroke-opacity="0.36" stroke-width="8" stroke-dasharray="18 16" filter="url(#softGlow)"/>
    <circle r="88" fill="none" stroke="#223047" stroke-width="2"/>
    <circle r="88" class="ring" stroke="url(#accent)" stroke-opacity="0.55" stroke-width="6" stroke-dasharray="8 12"/>
    <circle r="44" fill="#0F172A" stroke="#334155" stroke-width="2"/>
    <circle r="12" fill="#F8FAFC"/>

    <path d="M0 -114C42 -114 80 -97 108 -69" class="ring" stroke="#22D3EE" stroke-width="5"/>
    <path d="M108 -69C128 -45 140 -15 140 18" class="ring" stroke="#38BDF8" stroke-width="5"/>
    <path d="M0 114C-42 114 -80 97 -108 69" class="ring" stroke="#34D399" stroke-width="5"/>
    <path d="M-108 69C-128 45 -140 15 -140 -18" class="ring" stroke="#2DD4BF" stroke-width="5"/>

    <line x1="0" y1="-88" x2="0" y2="-44" stroke="#94A3B8" stroke-width="2"/>
    <line x1="76" y1="-44" x2="38" y2="-22" stroke="#94A3B8" stroke-width="2"/>
    <line x1="76" y1="44" x2="38" y2="22" stroke="#94A3B8" stroke-width="2"/>
    <line x1="0" y1="88" x2="0" y2="44" stroke="#94A3B8" stroke-width="2"/>
    <line x1="-76" y1="44" x2="-38" y2="22" stroke="#94A3B8" stroke-width="2"/>
    <line x1="-76" y1="-44" x2="-38" y2="-22" stroke="#94A3B8" stroke-width="2"/>

    <circle cx="0" cy="-88" r="14" fill="#0F172A" stroke="#22D3EE" stroke-width="4" filter="url(#softGlow)"/>
    <circle cx="76" cy="-44" r="14" fill="#0F172A" stroke="#38BDF8" stroke-width="4" filter="url(#softGlow)"/>
    <circle cx="76" cy="44" r="14" fill="#0F172A" stroke="#818CF8" stroke-width="4" filter="url(#softGlow)"/>
    <circle cx="0" cy="88" r="14" fill="#0F172A" stroke="#A78BFA" stroke-width="4" filter="url(#softGlow)"/>
    <circle cx="-76" cy="44" r="14" fill="#0F172A" stroke="#2DD4BF" stroke-width="4" filter="url(#softGlow)"/>
    <circle cx="-76" cy="-44" r="14" fill="#0F172A" stroke="#34D399" stroke-width="4" filter="url(#softGlow)"/>

    <circle r="28" fill="#0F172A" stroke="url(#accent)" stroke-width="2" stroke-opacity="0.6"/>
    <text x="0" y="6" text-anchor="middle" font-size="18" font-weight="700" fill="#F8FAFC" letter-spacing="0.12em">FLOW</text>
  </g>

  <g>
    <rect x="1068" y="474" width="394" height="34" rx="17" fill="#0F172A" stroke="#334155"/>
    <text x="1265" y="496" text-anchor="middle" class="chip" fill="#C4B5FD">PROCESS ENGINE · AUDIT LOOPS · HUMAN GATE</text>
  </g>
</svg>
