<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 1240" role="img" aria-labelledby="title desc">
  <title id="title">六心智模型与十六个受控子系统</title>
  <desc id="desc">BMAD-Speckit-SDD-Flow 运行时架构图，展示受控需求记录、六个心智模型泳道、全部十六个生产闭环子系统、失败闭环重跑和只读投影层。</desc>
  <defs>
    <marker id="arrowBlue" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M1 1 L9 4 L1 7 Z" fill="#60a5fa"/>
    </marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M1 1 L9 4 L1 7 Z" fill="#10b981"/>
    </marker>
    <marker id="arrowAmber" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M1 1 L9 4 L1 7 Z" fill="#f59e0b"/>
    </marker>
    <marker id="arrowRed" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M1 1 L9 4 L1 7 Z" fill="#ef4444"/>
    </marker>
    <marker id="arrowCyan" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M1 1 L9 4 L1 7 Z" fill="#38bdf8"/>
    </marker>
    <filter id="softShadow" x="-14%" y="-14%" width="128%" height="128%">
      <feDropShadow dx="0" dy="14" stdDeviation="13" flood-color="#0f172a" flood-opacity="0.35"/>
    </filter>
    <linearGradient id="authorityPanel" x1="58" y1="112" x2="1222" y2="244" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1e293b"/>
      <stop offset="100%" stop-color="#1f2937"/>
    </linearGradient>
    <linearGradient id="lanePanel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#111827"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <style>
      .canvas { fill: #0f172a; }
      .title { font: 800 34px "Segoe UI", "Noto Sans SC", "Microsoft YaHei", Arial, sans-serif; fill: #f8fafc; letter-spacing: -0.4px; }
      .subtitle { font: 500 16.5px "Segoe UI", "Noto Sans SC", "Microsoft YaHei", Arial, sans-serif; fill: #cbd5e1; }
      .eyebrow { font: 800 12px "Segoe UI", "Noto Sans SC", "Microsoft YaHei", Arial, sans-serif; fill: #94a3b8; letter-spacing: 0.2em; }
      .panel-title { font: 800 20px "Segoe UI", "Noto Sans SC", "Microsoft YaHei", Arial, sans-serif; fill: #f8fafc; }
      .panel-copy { font: 600 14px "Segoe UI", "Noto Sans SC", "Microsoft YaHei", Arial, sans-serif; fill: #cbd5e1; }
      .model-index { font: 800 11px "Segoe UI", "Noto Sans SC", "Microsoft YaHei", Arial, sans-serif; fill: #94a3b8; letter-spacing: 0.14em; }
      .model-title { font: 800 16px "Segoe UI", "Noto Sans SC", "Microsoft YaHei", Arial, sans-serif; fill: #f8fafc; }
      .model-question { font: 600 11px "Segoe UI", "Noto Sans SC", "Microsoft YaHei", Arial, sans-serif; fill: #cbd5e1; }
      .chip-title { font: 800 11px "Segoe UI", "Noto Sans SC", "Microsoft YaHei", Arial, sans-serif; fill: #f8fafc; }
      .chip-id { font: 700 9px Consolas, Monaco, monospace; fill: #cbd5e1; }
      .label { font: 800 12px "Segoe UI", "Noto Sans SC", "Microsoft YaHei", Arial, sans-serif; fill: #bfdbfe; }
      .small { font: 600 11px "Segoe UI", "Noto Sans SC", "Microsoft YaHei", Arial, sans-serif; fill: #94a3b8; }
      .warning { font: 800 12px "Segoe UI", "Noto Sans SC", "Microsoft YaHei", Arial, sans-serif; fill: #fde68a; }
    </style>
  </defs>

  <rect class="canvas" width="1280" height="1240" rx="34"/>
  <g opacity="0.32" stroke="#334155" stroke-width="1">
    <path d="M0 120 H1280 M0 240 H1280 M0 360 H1280 M0 480 H1280 M0 600 H1280 M0 720 H1280 M0 840 H1280 M0 960 H1280 M0 1080 H1280 M0 1200 H1280"/>
    <path d="M120 0 V1240 M280 0 V1240 M440 0 V1240 M600 0 V1240 M760 0 V1240 M920 0 V1240 M1080 0 V1240"/>
  </g>
  <circle cx="1110" cy="128" r="170" fill="#1e40af" opacity="0.22"/>
  <circle cx="170" cy="790" r="190" fill="#0f766e" opacity="0.20"/>
  <circle cx="630" cy="120" r="128" fill="#0369a1" opacity="0.13"/>

  <g transform="translate(58 58)">
    <circle cx="8" cy="0" r="7" fill="#60a5fa"/>
    <text class="eyebrow" x="24" y="4">RUNTIME CONTROL ARCHITECTURE</text>
    <text class="title" x="0" y="54">六心智模型与 16 个受控子系统</text>
    <text class="subtitle" x="0" y="84">主 Agent 只能从受控 RequirementRecord 证据分支，不能从看板变绿、评分变绿、任务完成或旧 hint 直接继续。</text>
  </g>

  <g filter="url(#softShadow)">
    <rect x="828" y="44" width="394" height="62" rx="18" fill="#0f172a" stroke="#10b981" stroke-width="1.5"/>
    <text class="label" x="1025" y="70" text-anchor="middle">production loop ready</text>
    <text class="small" x="1025" y="91" text-anchor="middle">16 个子系统暴露输入、输出、状态、证据、哈希与失败处理</text>
  </g>

  <g filter="url(#softShadow)">
    <rect x="72" y="128" width="1136" height="58" rx="18" fill="#0f172a" stroke="#8b5cf6" stroke-width="1.8" stroke-dasharray="8 6"/>
    <rect x="94" y="143" width="126" height="28" rx="11" fill="#1e293b" stroke="#8b5cf6" stroke-width="1.2"/>
    <text class="label" x="157" y="161" text-anchor="middle">主 Agent</text>
    <text class="label" x="682" y="151" text-anchor="middle">主 Agent：主控编排层</text>
    <text class="small" x="682" y="171" text-anchor="middle">inspect 先读取受控上下文和证据，再路由、派发、处理 reconfirm_required，并在审计或 closeout 后重新读取</text>
  </g>

  <g filter="url(#softShadow)">
    <rect x="58" y="226" width="1164" height="132" rx="23" fill="url(#authorityPanel)" stroke="#60a5fa" stroke-width="2"/>
    <text class="panel-title" x="88" y="269">受控 RequirementRecord 存储</text>
    <text class="panel-copy" x="88" y="298">inspect 先解析活动需求，再校验记录哈希、恢复上下文、运行策略、当前 attempt 与受控事件 provenance。</text>
    <text class="panel-copy" x="88" y="324">索引、评分、看板、SFT 与 help 都是投影；只有被受控 ingest 写回为证据后，才可参与治理判断。</text>
  </g>

  <path d="M640 186 V222" stroke="#8b5cf6" stroke-width="3" marker-end="url(#arrowBlue)"/>
  <text class="small" x="662" y="210">inspect 读取上下文和证据</text>
  <path d="M640 358 V416" stroke="#60a5fa" stroke-width="3" marker-end="url(#arrowBlue)"/>

  <g transform="translate(50 520)">
    <g filter="url(#softShadow)">
      <rect x="0" y="0" width="180" height="492" rx="20" fill="url(#lanePanel)" stroke="#60a5fa" stroke-width="2"/>
      <text class="model-index" x="18" y="32">MODEL 01</text>
      <text class="model-title" x="18" y="59">需求确认</text>
      <text class="model-question" x="18" y="90">做什么、不做什么、证据 ID</text>
      <rect x="16" y="144" width="148" height="46" rx="13" fill="#1e293b" stroke="#60a5fa" stroke-width="1.5"/>
      <text class="chip-title" x="90" y="164" text-anchor="middle">需求确认</text>
      <text class="chip-id" x="90" y="181" text-anchor="middle">requirement_confirmation</text>
    </g>

    <g transform="translate(200 0)" filter="url(#softShadow)">
      <rect x="0" y="0" width="180" height="492" rx="20" fill="url(#lanePanel)" stroke="#38bdf8" stroke-width="2"/>
      <text class="model-index" x="18" y="32">MODEL 02</text>
      <text class="model-title" x="18" y="59">架构确认</text>
      <text class="model-question" x="18" y="90">契约、schema、风险边界</text>
      <rect x="16" y="144" width="148" height="46" rx="13" fill="#1e293b" stroke="#38bdf8" stroke-width="1.5"/>
      <text class="chip-title" x="90" y="164" text-anchor="middle">架构确认</text>
      <text class="chip-id" x="90" y="181" text-anchor="middle">architecture_confirmation</text>
      <rect x="16" y="202" width="148" height="46" rx="13" fill="#1e293b" stroke="#38bdf8" stroke-width="1.5"/>
      <text class="chip-title" x="90" y="222" text-anchor="middle">治理契约</text>
      <text class="chip-id" x="90" y="239" text-anchor="middle">governance</text>
    </g>

    <g transform="translate(400 0)" filter="url(#softShadow)">
      <rect x="0" y="0" width="180" height="492" rx="20" fill="url(#lanePanel)" stroke="#10b981" stroke-width="2"/>
      <text class="model-index" x="18" y="32">MODEL 03</text>
      <text class="model-title" x="18" y="59">实施准备</text>
      <text class="model-question" x="18" y="90">入口门禁与 readiness baseline</text>
      <rect x="16" y="144" width="148" height="46" rx="13" fill="#1e293b" stroke="#10b981" stroke-width="1.5"/>
      <text class="chip-title" x="90" y="164" text-anchor="middle">实施准备</text>
      <text class="chip-id" x="90" y="181" text-anchor="middle">implementation_readiness</text>
      <rect x="16" y="218" width="148" height="88" rx="16" fill="#0f172a" stroke="#10b981" stroke-width="1.5" stroke-dasharray="7 5"/>
      <text class="label" x="90" y="249" text-anchor="middle">audit-required</text>
      <text class="small" x="90" y="272" text-anchor="middle">先激活，再由审计评分</text>
      <text class="small" x="90" y="291" text-anchor="middle">必须带 provenance</text>
    </g>

    <g transform="translate(600 0)" filter="url(#softShadow)">
      <rect x="0" y="0" width="180" height="492" rx="20" fill="url(#lanePanel)" stroke="#8b5cf6" stroke-width="2"/>
      <text class="model-index" x="18" y="32">MODEL 04</text>
      <text class="model-title" x="18" y="59">执行闭合</text>
      <text class="model-question" x="18" y="90">bounded packet 与 trace 证据</text>
      <rect x="16" y="144" width="148" height="46" rx="13" fill="#1e293b" stroke="#8b5cf6" stroke-width="1.5"/>
      <text class="chip-title" x="90" y="164" text-anchor="middle">派发证据</text>
      <text class="chip-id" x="90" y="181" text-anchor="middle">bounded_packet_closure</text>
      <rect x="16" y="202" width="148" height="46" rx="13" fill="#1e293b" stroke="#8b5cf6" stroke-width="1.5"/>
      <text class="chip-title" x="90" y="222" text-anchor="middle">执行追踪</text>
      <text class="chip-id" x="90" y="239" text-anchor="middle">execution_tracking</text>
      <rect x="16" y="260" width="148" height="46" rx="13" fill="#1e293b" stroke="#8b5cf6" stroke-width="1.5"/>
      <text class="chip-title" x="90" y="280" text-anchor="middle">提示包生成</text>
      <text class="chip-id" x="90" y="297" text-anchor="middle">prompt_packet_generation</text>
    </g>

    <g transform="translate(800 0)" filter="url(#softShadow)">
      <rect x="0" y="0" width="180" height="492" rx="20" fill="url(#lanePanel)" stroke="#f59e0b" stroke-width="2"/>
      <text class="model-index" x="18" y="32">MODEL 05</text>
      <text class="model-title" x="18" y="59">审计复核</text>
      <text class="model-question" x="18" y="90">finding、RCA、评分与数据</text>
      <rect x="16" y="132" width="148" height="42" rx="12" fill="#1e293b" stroke="#f59e0b" stroke-width="1.5"/>
      <text class="chip-title" x="90" y="149" text-anchor="middle">审计复核</text>
      <text class="chip-id" x="90" y="165" text-anchor="middle">audit_review</text>
      <rect x="16" y="184" width="148" height="42" rx="12" fill="#1e293b" stroke="#f59e0b" stroke-width="1.5"/>
      <text class="chip-title" x="90" y="201" text-anchor="middle">RCA 改进</text>
      <text class="chip-id" x="90" y="217" text-anchor="middle">rca_improvement</text>
      <rect x="16" y="236" width="148" height="42" rx="12" fill="#1e293b" stroke="#f59e0b" stroke-width="1.5"/>
      <text class="chip-title" x="90" y="253" text-anchor="middle">评分桥接</text>
      <text class="chip-id" x="90" y="269" text-anchor="middle">scoring</text>
      <rect x="16" y="288" width="148" height="42" rx="12" fill="#1e293b" stroke="#f59e0b" stroke-width="1.5"/>
      <text class="chip-title" x="90" y="305" text-anchor="middle">数据生产</text>
      <text class="chip-id" x="90" y="321" text-anchor="middle">data_production</text>
      <rect x="16" y="340" width="148" height="42" rx="12" fill="#1e293b" stroke="#f59e0b" stroke-width="1.5"/>
      <text class="chip-title" x="90" y="357" text-anchor="middle">评测与 SFT</text>
      <text class="chip-id" x="90" y="373" text-anchor="middle">eval_sft</text>
      <rect x="16" y="392" width="148" height="42" rx="12" fill="#1e293b" stroke="#f59e0b" stroke-width="1.5"/>
      <text class="chip-title" x="90" y="409" text-anchor="middle">诊断教练</text>
      <text class="chip-id" x="90" y="425" text-anchor="middle">coach</text>
    </g>

    <g transform="translate(1000 0)" filter="url(#softShadow)">
      <rect x="0" y="0" width="180" height="492" rx="20" fill="url(#lanePanel)" stroke="#ec4899" stroke-width="2"/>
      <text class="model-index" x="18" y="32">MODEL 06</text>
      <text class="model-title" x="18" y="59">交付确认</text>
      <text class="model-question" x="18" y="90">只认当前 closeout attempt</text>
      <rect x="16" y="144" width="148" height="46" rx="13" fill="#1e293b" stroke="#ec4899" stroke-width="1.5"/>
      <text class="chip-title" x="90" y="164" text-anchor="middle">交付收口</text>
      <text class="chip-id" x="90" y="181" text-anchor="middle">delivery_closeout</text>
      <rect x="16" y="202" width="148" height="46" rx="13" fill="#1e293b" stroke="#ec4899" stroke-width="1.5"/>
      <text class="chip-title" x="90" y="222" text-anchor="middle">可观测性</text>
      <text class="chip-id" x="90" y="239" text-anchor="middle">observability</text>
      <rect x="16" y="260" width="148" height="46" rx="13" fill="#1e293b" stroke="#ec4899" stroke-width="1.5"/>
      <text class="chip-title" x="90" y="280" text-anchor="middle">看板读模型</text>
      <text class="chip-id" x="90" y="297" text-anchor="middle">dashboard_read_model</text>
    </g>

    <path d="M180 246 H192" stroke="#10b981" stroke-width="3" marker-end="url(#arrowGreen)"/>
    <path d="M380 246 H392" stroke="#10b981" stroke-width="3" marker-end="url(#arrowGreen)"/>
    <path d="M580 246 H592" stroke="#10b981" stroke-width="3" marker-end="url(#arrowGreen)"/>
    <path d="M780 246 H792" stroke="#10b981" stroke-width="3" marker-end="url(#arrowGreen)"/>
    <path d="M980 246 H992" stroke="#10b981" stroke-width="3" marker-end="url(#arrowGreen)"/>
    <path d="M1094 246 H1192 V-50 H510" fill="none" stroke="#ef4444" stroke-width="3" stroke-dasharray="9 7" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M510 -50 V0" fill="none" stroke="#ef4444" stroke-width="3" stroke-dasharray="9 7" stroke-linecap="round" marker-end="url(#arrowRed)"/>
    <path d="M710 -50 V0" fill="none" stroke="#ef4444" stroke-width="3" stroke-dasharray="9 7" stroke-linecap="round" marker-end="url(#arrowRed)"/>
    <path d="M910 -50 V0" fill="none" stroke="#ef4444" stroke-width="3" stroke-dasharray="9 7" stroke-linecap="round" marker-end="url(#arrowRed)"/>
    <text class="warning" x="760" y="-74" text-anchor="middle">fail closed：证据陈旧、歧义或缺失时回到审计、实施准备或执行闭合</text>
    <text class="label" x="590" y="-128" text-anchor="middle">青色虚线请求连接：任一阶段可请求主控路由重新确认</text>
    <path d="M90 0 V-114" fill="none" stroke="#38bdf8" stroke-width="2.2" stroke-dasharray="5 6" stroke-linecap="round"/>
    <path d="M290 0 V-114" fill="none" stroke="#38bdf8" stroke-width="2.2" stroke-dasharray="5 6" stroke-linecap="round"/>
    <path d="M490 0 V-114" fill="none" stroke="#38bdf8" stroke-width="2.2" stroke-dasharray="5 6" stroke-linecap="round"/>
    <path d="M690 0 V-114" fill="none" stroke="#38bdf8" stroke-width="2.2" stroke-dasharray="5 6" stroke-linecap="round"/>
    <path d="M890 0 V-114" fill="none" stroke="#38bdf8" stroke-width="2.2" stroke-dasharray="5 6" stroke-linecap="round"/>
    <path d="M1090 0 V-114" fill="none" stroke="#38bdf8" stroke-width="2.2" stroke-dasharray="5 6" stroke-linecap="round"/>
    <path d="M90 -114 V0" fill="none" stroke="#38bdf8" stroke-width="2.8" stroke-dasharray="6 6" stroke-linecap="round" marker-end="url(#arrowCyan)"/>
    <path d="M290 -114 V0" fill="none" stroke="#38bdf8" stroke-width="2.8" stroke-dasharray="6 6" stroke-linecap="round" marker-end="url(#arrowCyan)"/>
  </g>

  <g filter="url(#softShadow)">
    <rect x="58" y="1048" width="1164" height="116" rx="22" fill="#111827" stroke="#334155" stroke-width="2"/>
    <text class="panel-title" x="88" y="1088">只读投影层</text>
    <text class="panel-copy" x="88" y="1116">看板、Runtime MCP、评分视图、诊断输出、SFT 数据集与 help 推荐只负责把证据展示给人和 Agent。</text>
    <text class="panel-copy" x="88" y="1140">没有受控 ingest 证据时，它们不能关闭需求、替代 Delivery Closeout Gate，也不能选择下一条全局分支。</text>
    <rect x="830" y="1080" width="334" height="44" rx="14" fill="#0f172a" stroke="#ef4444" stroke-width="1.5"/>
    <text class="warning" x="997" y="1108" text-anchor="middle">禁止作为完成权威</text>
  </g>

  <g transform="translate(58 1204)">
    <circle cx="6" cy="0" r="6" fill="#10b981"/>
    <text class="small" x="20" y="5">实线箭头：受控推进</text>
    <circle cx="210" cy="0" r="6" fill="#ef4444"/>
    <text class="small" x="224" y="5">红色虚线折线：fail-closed 重跑</text>
    <circle cx="458" cy="0" r="6" fill="#38bdf8"/>
    <text class="small" x="472" y="5">青色虚线连接：向主控请求重新确认</text>
    <circle cx="790" cy="0" r="6" fill="#60a5fa"/>
    <text class="small" x="804" y="5">控制源：requirement-record.json</text>
  </g>
</svg>
