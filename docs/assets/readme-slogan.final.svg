<svg width="1600" height="640" viewBox="0 0 1600 640" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">BMAD-Speckit-SDD-Flow slogan banner</title>
  <desc id="desc">Think in Agents. Ship by Spec. A brand banner with concise positioning copy and a distinct orbital emblem representing orchestrated AI delivery.</desc>
  <defs>
    <linearGradient id="bg" x1="120" y1="40" x2="1500" y2="620" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0D1117"/>
      <stop offset="0.56" stop-color="#111827"/>
      <stop offset="1" stop-color="#0F172A"/>
    </linearGradient>
    <radialGradient id="glowA" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(1270 150) rotate(90) scale(280 620)">
      <stop stop-color="#7C3AED" stop-opacity="0.16"/>
      <stop offset="1" stop-color="#7C3AED" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowB" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(260 560) rotate(90) scale(260 620)">
      <stop stop-color="#06B6D4" stop-opacity="0.10"/>
      <stop offset="1" stop-color="#06B6D4" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="accent" x1="1140" y1="176" x2="1418" y2="468" gradientUnits="userSpaceOnUse">
      <stop stop-color="#22D3EE"/>
      <stop offset="0.45" stop-color="#818CF8"/>
      <stop offset="1" stop-color="#34D399"/>
    </linearGradient>
    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="coreGlow" x="-120%" y="-120%" width="340%" height="340%">
      <feGaussianBlur stdDeviation="14" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <style>
      .eyebrow { font: 700 13px Inter, Segoe UI, Arial, sans-serif; letter-spacing: 0.18em; fill: #67E8F9; }
      .title { font: 700 58px Inter, Segoe UI, Arial, sans-serif; fill: #F8FAFC; letter-spacing: -0.03em; }
      .subtitle { font: 500 21px Inter, Segoe UI, Arial, sans-serif; fill: #94A3B8; }
      .tiny { font: 600 13px Inter, Segoe UI, Arial, sans-serif; fill: #64748B; letter-spacing: 0.1em; }
      .ring { fill: none; stroke-linecap: round; }
    </style>
  </defs>

  <rect width="1600" height="640" rx="24" fill="url(#bg)"/>
  <rect width="1600" height="640" rx="24" fill="url(#glowA)"/>
  <rect width="1600" height="640" rx="24" fill="url(#glowB)"/>

  <g opacity="0.12">
    <circle cx="190" cy="92" r="2" fill="#38BDF8"/>
    <circle cx="308" cy="144" r="2" fill="#38BDF8"/>
    <circle cx="1418" cy="84" r="2" fill="#A78BFA"/>
    <circle cx="1362" cy="562" r="2" fill="#34D399"/>
  </g>

  <g>
    <text x="96" y="154" class="eyebrow">BMAD-SPECKIT-SDD-FLOW</text>
    <text x="96" y="246" class="title">Think in Agents.</text>
    <text x="96" y="314" class="title">Ship by Spec.</text>
    <text x="96" y="372" class="subtitle">Open-source AI delivery workflow. Structured planning, audited execution, human-reviewed shipping.</text>
    <text x="96" y="422" class="tiny">BUILT ON BMAD METHOD + SPEC-DRIVEN DEVELOPMENT</text>
  </g>

  <g transform="translate(1281 320)">
    <circle r="148" fill="none" stroke="#162132" stroke-width="1.5" opacity="0.55"/>
    <ellipse rx="136" ry="112" fill="none" stroke="#1E293B" stroke-width="2" opacity="0.85"/>
    <ellipse rx="136" ry="112" class="ring" stroke="url(#accent)" stroke-opacity="0.20" stroke-width="8" stroke-dasharray="22 18" filter="url(#softGlow)"/>
    <ellipse rx="98" ry="78" fill="none" stroke="#223047" stroke-width="2"/>
    <ellipse rx="98" ry="78" class="ring" stroke="url(#accent)" stroke-opacity="0.44" stroke-width="6" stroke-dasharray="10 12"/>

    <path d="M0 -100C46 -100 88 -83 118 -56" class="ring" stroke="#22D3EE" stroke-width="5"/>
    <path d="M118 -56C138 -34 150 -6 150 24" class="ring" stroke="#38BDF8" stroke-width="5"/>
    <path d="M0 100C-46 100 -88 83 -118 56" class="ring" stroke="#34D399" stroke-width="5"/>
    <path d="M-118 56C-138 34 -150 6 -150 -24" class="ring" stroke="#2DD4BF" stroke-width="5"/>

    <path d="M0 -78V-24" stroke="#7DD3FC" stroke-opacity="0.55" stroke-width="2.5"/>
    <path d="M68 -38L28 -16" stroke="#93C5FD" stroke-opacity="0.5" stroke-width="2.5"/>
    <path d="M68 38L28 16" stroke="#A5B4FC" stroke-opacity="0.5" stroke-width="2.5"/>
    <path d="M0 78V24" stroke="#C4B5FD" stroke-opacity="0.5" stroke-width="2.5"/>
    <path d="M-68 38L-28 16" stroke="#99F6E4" stroke-opacity="0.5" stroke-width="2.5"/>
    <path d="M-68 -38L-28 -16" stroke="#86EFAC" stroke-opacity="0.5" stroke-width="2.5"/>

    <circle cx="0" cy="-100" r="15" fill="#0F172A" stroke="#22D3EE" stroke-width="4" filter="url(#softGlow)"/>
    <circle cx="86" cy="-50" r="15" fill="#0F172A" stroke="#38BDF8" stroke-width="4" filter="url(#softGlow)"/>
    <circle cx="86" cy="50" r="15" fill="#0F172A" stroke="#818CF8" stroke-width="4" filter="url(#softGlow)"/>
    <circle cx="0" cy="100" r="15" fill="#0F172A" stroke="#A78BFA" stroke-width="4" filter="url(#softGlow)"/>
    <circle cx="-86" cy="50" r="15" fill="#0F172A" stroke="#2DD4BF" stroke-width="4" filter="url(#softGlow)"/>
    <circle cx="-86" cy="-50" r="15" fill="#0F172A" stroke="#34D399" stroke-width="4" filter="url(#softGlow)"/>

    <path d="M-18 -18L18 -18L18 18L-18 18Z" fill="#0B1220" stroke="#334155" stroke-width="2.5" transform="rotate(45)"/>
    <circle r="26" fill="#0B1220" stroke="#475569" stroke-width="2.5"/>
    <circle r="16" fill="url(#accent)" opacity="0.95" filter="url(#coreGlow)"/>
    <circle r="6.5" fill="#F8FAFC"/>
  </g>
</svg>
