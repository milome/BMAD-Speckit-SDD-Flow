<svg width="1600" height="640" viewBox="0 0 1600 640" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">BMAD-Speckit-SDD-Flow slogan banner</title>
  <desc id="desc">Think in Agents. Ship by Spec. A glowing Cyber-Tree where AI Agents hang like apples, deeply rooted in a Planter made of the Verified Specification Document.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1600" y2="640" gradientUnits="userSpaceOnUse">
      <stop stop-color="#050505"/>
      <stop offset="1" stop-color="#0A0A0A"/>
    </linearGradient>
    <radialGradient id="centerGlow" cx="50%" cy="50%" r="50%" gradientUnits="userSpaceOnUse" gradientTransform="translate(1150 280) scale(600 600)">
      <stop stop-color="#10b981" stop-opacity="0.12"/>
      <stop offset="0.6" stop-color="#3b82f6" stop-opacity="0.08"/>
      <stop offset="1" stop-color="#0A0A0A" stop-opacity="0"/>
    </radialGradient>

    <linearGradient id="textGradient" x1="0" y1="200" x2="600" y2="380" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#9CA3AF"/>
    </linearGradient>
    <linearGradient id="badgeGradient" x1="0" y1="0" x2="200" y2="0" gradientUnits="userSpaceOnUse">
      <stop stop-color="#3b82f6"/>
      <stop offset="1" stop-color="#10b981"/>
    </linearGradient>

    <!-- Tree Branch Gradients (Flowing from Spec/Emerald to Agent Colors) -->
    <linearGradient id="gradLeft" x1="1" y1="1" x2="0" y2="0">
      <stop offset="0" stop-color="#10b981"/>
      <stop offset="1" stop-color="#3b82f6"/>
    </linearGradient>
    <linearGradient id="gradRight" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0" stop-color="#10b981"/>
      <stop offset="1" stop-color="#f59e0b"/>
    </linearGradient>
    <linearGradient id="gradTop" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0" stop-color="#10b981"/>
      <stop offset="1" stop-color="#8b5cf6"/>
    </linearGradient>

    <filter id="softGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="superGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="16" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Reusable Bot/Agent Icon -->
    <g id="bot-icon">
      <rect x="-14" y="-12" width="28" height="24" rx="6" fill="none" stroke="currentColor" stroke-width="3"/>
      <circle cx="-6" cy="-4" r="3" fill="currentColor"/>
      <circle cx="6" cy="-4" r="3" fill="currentColor"/>
      <path d="M -5 6 L 5 6" stroke="currentColor" stroke-width="3" stroke-linecap="round"/>
      <path d="M 0 -12 L 0 -18" stroke="currentColor" stroke-width="3" stroke-linecap="round"/>
      <circle cx="0" cy="-20" r="2" fill="currentColor"/>
    </g>

    <style>
      .badge-text { font: 600 13px "Inter", -apple-system, sans-serif; letter-spacing: 0.2em; fill: #FFFFFF; }
      .title { font: 800 72px "Inter", -apple-system, sans-serif; fill: url(#textGradient); letter-spacing: -0.04em; }
      .subtitle { font: 400 24px "Inter", -apple-system, sans-serif; fill: #6B7280; letter-spacing: -0.01em; line-height: 1.5; }
      .highlight { fill: #E5E7EB; font-weight: 500; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="1600" height="640" rx="32" fill="url(#bg)"/>

  <!-- Grid Pattern Overlay -->
  <g stroke="#1F2937" stroke-width="1" stroke-dasharray="2 4" opacity="0.4">
    <path d="M0 80 H1600 M0 160 H1600 M0 240 H1600 M0 320 H1600 M0 400 H1600 M0 480 H1600 M0 560 H1600"/>
    <path d="M160 0 V640 M320 0 V640 M480 0 V640 M640 0 V640 M800 0 V640 M960 0 V640 M1120 0 V640 M1280 0 V640 M1440 0 V640"/>
  </g>

  <!-- Central Glow -->
  <rect width="1600" height="640" rx="32" fill="url(#centerGlow)"/>

  <!-- ================= LEFT CONTENT: TEXT ================= -->
  <g transform="translate(120, 0)">
    <!-- Badge -->
    <g transform="translate(0, 160)">
      <rect width="260" height="36" rx="18" fill="url(#badgeGradient)" opacity="0.15"/>
      <rect width="260" height="36" rx="18" stroke="url(#badgeGradient)" stroke-width="1.5" opacity="0.8"/>
      <text x="130" y="23" text-anchor="middle" class="badge-text">BMAD-SPECKIT-SDD-FLOW</text>
    </g>

    <!-- Typography -->
    <text x="0" y="280" class="title">Think in Agents.</text>
    <text x="0" y="360" class="title">Ship by Spec.</text>

    <text x="0" y="420" class="subtitle">
      <tspan x="0" dy="0">The zero-compromise AI delivery workflow.</tspan>
      <tspan x="0" dy="36">Combining <tspan class="highlight">Agile Multi-Agent Debates</tspan> with rigorous</tspan>
      <tspan x="0" dy="36"><tspan class="highlight">Spec-Driven Development</tspan> to ensure audited quality.</tspan>
    </text>
  </g>

  <!-- ================= RIGHT GRAPHIC: TREE + APPLES + PLANTER ================= -->
  <g transform="translate(1150, 260)">

    <!-- BACKGROUND AMBIENCE RINGS (Aura of the Tree) -->
    <circle cx="0" cy="0" r="280" fill="none" stroke="#1F2937" stroke-width="1.5" stroke-dasharray="8 16"/>
    <circle cx="0" cy="0" r="180" fill="none" stroke="#374151" stroke-width="1" stroke-dasharray="2 10"/>

    <!-- ================= THE CYBER TREE OF KNOWLEDGE ================= -->
    <g id="cyber-tree">
      <!-- Main Trunk growing from the Pot -->
      <path d="M 0 150 L 0 70" fill="none" stroke="#10b981" stroke-width="14" filter="url(#softGlow)" stroke-linecap="round"/>
      <path d="M -10 150 Q -25 100, 0 70" fill="none" stroke="#10b981" stroke-width="6" opacity="0.8"/>
      <path d="M 10 150 Q 25 100, 0 70" fill="none" stroke="#10b981" stroke-width="6" opacity="0.8"/>

      <!-- Top Branch (Architect) -->
      <path d="M 0 75 Q 0 -50, 0 -190" fill="none" stroke="url(#gradTop)" stroke-width="8" filter="url(#softGlow)" stroke-linecap="round"/>
      <path d="M 0 -190 L 0 -150" fill="none" stroke="#8b5cf6" stroke-width="4" stroke-linecap="round"/> <!-- Hanging Stem -->

      <!-- Left Branch (Coder) -->
      <path d="M 0 80 C -20 60, -140 50, -140 -100" fill="none" stroke="url(#gradLeft)" stroke-width="8" filter="url(#softGlow)" stroke-linecap="round"/>
      <path d="M -140 -100 L -140 -40" fill="none" stroke="#3b82f6" stroke-width="4" stroke-linecap="round"/> <!-- Hanging Stem -->

      <!-- Right Branch (Auditor) -->
      <path d="M 0 80 C 20 60, 140 50, 140 -100" fill="none" stroke="url(#gradRight)" stroke-width="8" filter="url(#softGlow)" stroke-linecap="round"/>
      <path d="M 140 -100 L 140 -40" fill="none" stroke="#f59e0b" stroke-width="4" stroke-linecap="round"/> <!-- Hanging Stem -->

      <!-- Decorative Canopy Branches (Digital Foliage) -->
      <path d="M 0 50 Q -70 10, -80 -100" fill="none" stroke="#10b981" stroke-width="3" opacity="0.6" stroke-linecap="round"/>
      <path d="M 0 50 Q 70 10, 80 -100" fill="none" stroke="#10b981" stroke-width="3" opacity="0.6" stroke-linecap="round"/>
      <path d="M -50 -10 Q -90 -40, -100 -120" fill="none" stroke="#3b82f6" stroke-width="2" opacity="0.5" stroke-linecap="round"/>
      <path d="M 50 -10 Q 90 -40, 100 -120" fill="none" stroke="#f59e0b" stroke-width="2" opacity="0.5" stroke-linecap="round"/>

      <!-- Internal Data Flow (Pulses moving from Apples to Spec) -->
      <path d="M 0 -190 L 0 150" fill="none" stroke="#FFFFFF" stroke-width="2" stroke-dasharray="8 12" opacity="0.8"/>
      <path d="M -140 -100 C -140 50, -20 60, 0 80" fill="none" stroke="#FFFFFF" stroke-width="2" stroke-dasharray="8 12" opacity="0.6"/>
      <path d="M 140 -100 C 140 50, 20 60, 0 80" fill="none" stroke="#FFFFFF" stroke-width="2" stroke-dasharray="8 12" opacity="0.6"/>

      <!-- Floating Tech Leaves (Nutrients/Code Packets) -->
      <circle cx="-80" cy="-100" r="4" fill="#10b981" filter="url(#softGlow)"/>
      <circle cx="80" cy="-100" r="4" fill="#10b981" filter="url(#softGlow)"/>
      <circle cx="-100" cy="-120" r="3" fill="#3b82f6" filter="url(#softGlow)"/>
      <circle cx="100" cy="-120" r="3" fill="#f59e0b" filter="url(#softGlow)"/>
      <circle cx="-40" cy="-140" r="4.5" fill="#8b5cf6" filter="url(#softGlow)"/>
      <circle cx="40" cy="-140" r="4.5" fill="#8b5cf6" filter="url(#softGlow)"/>
      <circle cx="-110" cy="-40" r="3" fill="#3b82f6" filter="url(#softGlow)"/>
      <circle cx="110" cy="-40" r="3" fill="#f59e0b" filter="url(#softGlow)"/>
      <circle cx="-30" cy="-30" r="3" fill="#10b981" opacity="0.5"/>
      <circle cx="30" cy="-30" r="3" fill="#10b981" opacity="0.5"/>
    </g>

    <!-- ================= SPEC DOCUMENT AS THE PLANTER / POT ================= -->
    <!-- Positioned safely at the bottom, acting as the root foundation -->
    <g transform="translate(0, 150)">

      <!-- Energy Soil / Root Connection Bracket -->
      <path d="M -50 0 L -30 -15 L 30 -15 L 50 0 Z" fill="#10b981" fill-opacity="0.3" stroke="#10b981" stroke-width="3" filter="url(#softGlow)"/>

      <!-- Planter Rim (Giving it depth and structure) -->
      <rect x="-150" y="0" width="300" height="15" rx="4" fill="#0A0A0A" stroke="#10b981" stroke-width="4" filter="url(#softGlow)"/>

      <!-- Document Planter Base -->
      <path d="M -140 15 L 140 15 L 130 110 C 130 115, 125 120, 120 120 L -120 120 C -125 120, -130 115, -130 110 Z" fill="#05050A" stroke="#10b981" stroke-width="4" filter="url(#softGlow)"/>
      <path d="M -140 15 L 140 15 L 130 110 C 130 115, 125 120, 120 120 L -120 120 C -125 120, -130 115, -130 110 Z" fill="none" stroke="#FFFFFF" stroke-width="1.5" opacity="0.4"/>

      <!-- Spec Blueprint Grid / Code Lines inside the Planter -->
      <line x1="-110" y1="40" x2="-20" y2="40" stroke="#10b981" stroke-width="8" stroke-linecap="round"/>
      <line x1="-110" y1="65" x2="50" y2="65" stroke="#10b981" stroke-width="8" stroke-linecap="round" opacity="0.6"/>
      <line x1="-110" y1="90" x2="10" y2="90" stroke="#10b981" stroke-width="8" stroke-linecap="round" opacity="0.6"/>

      <!-- Massive Official "Verified" Seal / Stamp on the Right -->
      <g transform="translate(85, 60)">
         <!-- Seal Background & Glow -->
         <circle cx="0" cy="0" r="42" fill="#0A0A0A" stroke="#10b981" stroke-width="6" filter="url(#superGlow)"/>
         <circle cx="0" cy="0" r="42" fill="none" stroke="#FFFFFF" stroke-width="2" opacity="0.6"/>
         <!-- Checkmark Path -->
         <path d="M -18 2 L -5 16 L 22 -12" fill="none" stroke="#10b981" stroke-width="10" stroke-linecap="round" stroke-linejoin="round" filter="url(#softGlow)"/>
         <path d="M -18 2 L -5 16 L 22 -12" fill="none" stroke="#FFFFFF" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
      </g>
    </g>

    <!-- ================= HANGING AGENT APPLES ================= -->

    <!-- Top Agent Apple (Planner / Architect) -->
    <g transform="translate(0, -110)">
      <!-- Cyber Leaf attached to stem -->
      <path d="M 0 -40 Q 15 -45, 20 -60 Q 5 -55, 0 -40 Z" fill="#8b5cf6" filter="url(#softGlow)"/>
      <path d="M 0 -40 Q -15 -45, -20 -60 Q -5 -55, 0 -40 Z" fill="#8b5cf6" opacity="0.6"/>

      <!-- Agent Apple Body -->
      <circle cx="0" cy="0" r="40" fill="#0A0A0A" stroke="#8b5cf6" stroke-width="5" filter="url(#softGlow)"/>
      <circle cx="0" cy="0" r="40" fill="none" stroke="#FFFFFF" stroke-width="1" opacity="0.6"/>
      <use href="#bot-icon" fill="none" stroke="#8b5cf6" style="color: #8b5cf6" transform="scale(1.2)"/>
    </g>

    <!-- Left Agent Apple (Developer / Coder) -->
    <g transform="translate(-140, 0)">
      <!-- Cyber Leaf attached to stem -->
      <path d="M 0 -40 Q -15 -45, -20 -60 Q -5 -55, 0 -40 Z" fill="#3b82f6" filter="url(#softGlow)"/>

      <!-- Agent Apple Body -->
      <circle cx="0" cy="0" r="40" fill="#0A0A0A" stroke="#3b82f6" stroke-width="5" filter="url(#softGlow)"/>
      <circle cx="0" cy="0" r="40" fill="none" stroke="#FFFFFF" stroke-width="1" opacity="0.6"/>
      <use href="#bot-icon" fill="none" stroke="#3b82f6" style="color: #3b82f6" transform="scale(1.2)"/>
    </g>

    <!-- Right Agent Apple (Critical Auditor) -->
    <g transform="translate(140, 0)">
      <!-- Cyber Leaf attached to stem -->
      <path d="M 0 -40 Q 15 -45, 20 -60 Q 5 -55, 0 -40 Z" fill="#f59e0b" filter="url(#softGlow)"/>

      <!-- Agent Apple Body -->
      <circle cx="0" cy="0" r="40" fill="#0A0A0A" stroke="#f59e0b" stroke-width="5" filter="url(#softGlow)"/>
      <circle cx="0" cy="0" r="40" fill="none" stroke="#FFFFFF" stroke-width="1" opacity="0.6"/>
      <use href="#bot-icon" fill="none" stroke="#f59e0b" style="color: #f59e0b" transform="scale(1.2)"/>
    </g>

  </g>
</svg>
