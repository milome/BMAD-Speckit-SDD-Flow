<svg width="1600" height="1120" viewBox="0 0 1600 1120" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">BMAD-Speckit-SDD-Flow architecture overview</title>
  <desc id="desc">Hybrid system diagram and infographic showing five layers from product intent to audited delivery, with audit loops, review checkpoints, and a nested Speckit workflow.</desc>
  <defs>
    <linearGradient id="bg" x1="120" y1="70" x2="1490" y2="1060" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0D1117"/>
      <stop offset="0.58" stop-color="#111827"/>
      <stop offset="1" stop-color="#0F172A"/>
    </linearGradient>
    <radialGradient id="glowA" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(1260 220) rotate(90) scale(420 760)">
      <stop stop-color="#7C3AED" stop-opacity="0.10"/>
      <stop offset="1" stop-color="#7C3AED" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowB" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(280 920) rotate(90) scale(360 760)">
      <stop stop-color="#06B6D4" stop-opacity="0.10"/>
      <stop offset="1" stop-color="#06B6D4" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="panelStroke" x1="300" y1="208" x2="1400" y2="930" gradientUnits="userSpaceOnUse">
      <stop stop-color="#334155"/>
      <stop offset="1" stop-color="#1F2937"/>
    </linearGradient>
    <linearGradient id="panelTop" x1="300" y1="208" x2="1400" y2="208" gradientUnits="userSpaceOnUse">
      <stop stop-color="#38BDF8" stop-opacity="0.18"/>
      <stop offset="0.5" stop-color="#A78BFA" stop-opacity="0.08"/>
      <stop offset="1" stop-color="#34D399" stop-opacity="0.14"/>
    </linearGradient>
    <linearGradient id="spineGlow" x1="238" y1="214" x2="238" y2="962" gradientUnits="userSpaceOnUse">
      <stop stop-color="#22D3EE"/>
      <stop offset="0.5" stop-color="#818CF8"/>
      <stop offset="1" stop-color="#34D399"/>
    </linearGradient>
    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="panelShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feOffset dy="10"/>
      <feGaussianBlur stdDeviation="16" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="0 0 0 0 0.02 0 0 0 0 0.05 0 0 0 0 0.10 0 0 0 0.45 0"/>
      <feBlend in="SourceGraphic" mode="normal"/>
    </filter>
    <filter id="nodeGlow" x="-200%" y="-200%" width="400%" height="400%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <marker id="arrow" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M0 0 L10 4 L0 8 Z" fill="#64748B"/>
    </marker>
    <marker id="arrowCyan" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M0 0 L10 4 L0 8 Z" fill="#22D3EE"/>
    </marker>
    <style>
      .eyebrow { font: 700 13px Inter, Segoe UI, Arial, sans-serif; letter-spacing: 0.18em; fill: #67E8F9; }
      .title { font: 700 40px Inter, Segoe UI, Arial, sans-serif; fill: #F8FAFC; letter-spacing: -0.02em; }
      .subtitle { font: 500 18px Inter, Segoe UI, Arial, sans-serif; fill: #94A3B8; }
      .layerTag { font: 700 11px Inter, Segoe UI, Arial, sans-serif; letter-spacing: 0.18em; fill: #67E8F9; }
      .layerTitle { font: 700 19px Inter, Segoe UI, Arial, sans-serif; fill: #F8FAFC; }
      .layerText { font: 500 12px Inter, Segoe UI, Arial, sans-serif; fill: #CBD5E1; }
      .micro { font: 700 11px Inter, Segoe UI, Arial, sans-serif; letter-spacing: 0.14em; }
      .flow { font: 600 13px Inter, Segoe UI, Arial, sans-serif; fill: #E2E8F0; }
      .spine { font: 700 12px Inter, Segoe UI, Arial, sans-serif; fill: #94A3B8; letter-spacing: 0.14em; }
      .legend { font: 600 12px Inter, Segoe UI, Arial, sans-serif; fill: #94A3B8; }
    </style>
  </defs>

  <rect width="1600" height="1120" rx="24" fill="url(#bg)"/>
  <rect width="1600" height="1120" rx="24" fill="url(#glowA)"/>
  <rect width="1600" height="1120" rx="24" fill="url(#glowB)"/>

  <g>
    <text x="96" y="122" class="eyebrow">ARCHITECTURE OVERVIEW</text>
    <text x="96" y="180" class="title">Five layers from product intent to audited delivery</text>
    <text x="96" y="218" class="subtitle">System flow on the spine. Review and audit constraints are embedded into the sequence itself.</text>
  </g>

  <g opacity="0.9">
    <rect x="164" y="236" width="52" height="738" rx="26" fill="#0F172A" stroke="#1E293B"/>
    <path d="M190 256V954" stroke="#334155" stroke-width="2"/>
    <path d="M238 244V962" stroke="#1E293B" stroke-width="2"/>
    <path d="M238 244V962" stroke="#334155" stroke-width="5" stroke-linecap="round" stroke-dasharray="1 18"/>
    <path d="M238 244V962" stroke="url(#spineGlow)" stroke-opacity="0.58" stroke-width="3" stroke-linecap="round" filter="url(#softGlow)"/>
    <circle cx="238" cy="286" r="6" fill="#22D3EE" filter="url(#nodeGlow)"/>
    <circle cx="238" cy="428" r="6" fill="#38BDF8" filter="url(#nodeGlow)"/>
    <circle cx="238" cy="578" r="6" fill="#A78BFA" filter="url(#nodeGlow)"/>
    <circle cx="238" cy="750" r="6" fill="#2DD4BF" filter="url(#nodeGlow)"/>
    <circle cx="238" cy="936" r="6" fill="#34D399" filter="url(#nodeGlow)"/>
  </g>

  <g>
    <text x="182" y="290" class="spine">L1</text>
    <text x="182" y="432" class="spine">L2</text>
    <text x="182" y="582" class="spine">L3</text>
    <text x="182" y="754" class="spine">L4</text>
    <text x="182" y="940" class="spine">L5</text>
  </g>

  <g opacity="0.36">
    <path d="M244 286H300" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>
    <path d="M244 428H300" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>
    <path d="M244 578H300" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>
    <path d="M244 750H300" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>
    <path d="M244 936H300" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>
  </g>

  <g stroke="#64748B" stroke-width="2" fill="none" opacity="0.6">
    <path d="M270 344 L270 368" marker-end="url(#arrow)"/>
    <path d="M270 486 L270 518" marker-end="url(#arrow)"/>
    <path d="M270 638 L270 690" marker-end="url(#arrow)"/>
    <path d="M270 856 L270 876" marker-end="url(#arrow)"/>
  </g>

  <g filter="url(#panelShadow)">
    <rect x="300" y="230" width="1180" height="112" rx="18" fill="#111827" stroke="url(#panelStroke)"/>
    <path d="M322 231H1458" stroke="url(#panelTop)" stroke-width="2" stroke-linecap="round"/>
  </g>
  <text x="332" y="268" class="layerTag">LAYER 1 · PRODUCT DEFINITION</text>
  <text x="332" y="300" class="layerTitle">Brief → Evaluation → PRD → Architecture</text>
  <text x="332" y="326" class="layerText">Complexity routes escalation. Architecture clears review before planning.</text>

  <g filter="url(#panelShadow)">
    <rect x="300" y="372" width="1180" height="112" rx="18" fill="#111827" stroke="url(#panelStroke)"/>
    <path d="M322 373H1458" stroke="url(#panelTop)" stroke-width="2" stroke-linecap="round"/>
  </g>
  <text x="332" y="410" class="layerTag">LAYER 2 · EPIC / STORY PLANNING</text>
  <text x="332" y="442" class="layerTitle">Epics / stories → dependency map → scope</text>
  <text x="332" y="468" class="layerText">Planning maps dependencies and selects execution scope.</text>

  <g filter="url(#panelShadow)">
    <rect x="300" y="522" width="1180" height="122" rx="18" fill="#111827" stroke="url(#panelStroke)"/>
    <path d="M322 523H1458" stroke="url(#panelTop)" stroke-width="2" stroke-linecap="round"/>
  </g>
  <text x="332" y="560" class="layerTag">LAYER 3 · STORY DEVELOPMENT</text>
  <text x="332" y="592" class="layerTitle">Create story → refine → story doc</text>
  <text x="332" y="618" class="layerText">Story work can recurse before implementation. First hard checkpoint lives here.</text>

  <g filter="url(#panelShadow)">
    <rect x="300" y="694" width="1180" height="162" rx="18" fill="#111827" stroke="url(#panelStroke)"/>
    <path d="M322 695H1458" stroke="url(#panelTop)" stroke-width="2" stroke-linecap="round"/>
  </g>
  <text x="332" y="724" class="layerTag">LAYER 4 · TECHNICAL IMPLEMENTATION</text>
  <text x="332" y="756" class="layerTitle">Nested speckit-workflow</text>
  <text x="332" y="784" class="layerText">Only expanded subsystem: a staged technical pipeline with checks around execution.</text>

  <g transform="translate(448 812)">
    <circle r="8" fill="#0F172A" stroke="#22D3EE" stroke-width="3" filter="url(#nodeGlow)"/>
    <text x="0" y="38" text-anchor="middle" class="flow">specify</text>
  </g>
  <g transform="translate(628 812)">
    <circle r="8" fill="#0F172A" stroke="#38BDF8" stroke-width="3" filter="url(#nodeGlow)"/>
    <text x="0" y="38" text-anchor="middle" class="flow">plan</text>
  </g>
  <g transform="translate(808 812)">
    <circle r="8" fill="#0F172A" stroke="#818CF8" stroke-width="3" filter="url(#nodeGlow)"/>
    <text x="0" y="38" text-anchor="middle" class="flow">GAPS</text>
  </g>
  <g transform="translate(988 812)">
    <circle r="8" fill="#0F172A" stroke="#A78BFA" stroke-width="3" filter="url(#nodeGlow)"/>
    <text x="0" y="38" text-anchor="middle" class="flow">tasks</text>
  </g>
  <g transform="translate(1168 812)">
    <circle r="8" fill="#0F172A" stroke="#2DD4BF" stroke-width="3" filter="url(#nodeGlow)"/>
    <text x="0" y="38" text-anchor="middle" class="flow">TDD</text>
  </g>

  <path d="M456 812 L1160 812" stroke="#334155" stroke-width="2" marker-end="url(#arrowCyan)"/>
  <path d="M456 812 L1160 812" stroke="#22D3EE" stroke-opacity="0.55" stroke-width="3" marker-end="url(#arrowCyan)" filter="url(#softGlow)"/>

  <g filter="url(#panelShadow)">
    <rect x="300" y="880" width="1180" height="92" rx="18" fill="#111827" stroke="url(#panelStroke)"/>
    <path d="M322 881H1458" stroke="url(#panelTop)" stroke-width="2" stroke-linecap="round"/>
  </g>
  <text x="332" y="906" class="layerTag">LAYER 5 · FINISH</text>
  <text x="332" y="934" class="layerTitle">Batch push → PR → human review</text>
  <text x="332" y="956" class="layerText">Closure happens only after human review and final audit.</text>
</svg>
