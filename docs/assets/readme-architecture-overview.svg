<svg width="1600" height="1120" viewBox="0 0 1600 1120" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">BMAD-Speckit-SDD-Flow architecture overview</title>
  <desc id="desc">System flowchart: five layers from product intent to audited delivery, with explicit flow arrows, audit gates, and nested speckit-workflow sub-flow.</desc>
  <defs>
    <linearGradient id="bg" x1="120" y1="70" x2="1490" y2="1060" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0D1117"/>
      <stop offset="0.58" stop-color="#111827"/>
      <stop offset="1" stop-color="#0F172A"/>
    </linearGradient>
    <radialGradient id="glowA" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(1260 220) rotate(90) scale(420 760)">
      <stop stop-color="#7C3AED" stop-opacity="0.10"/>
      <stop offset="1" stop-color="#7C3AED" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowB" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(280 920) rotate(90) scale(360 760)">
      <stop stop-color="#06B6D4" stop-opacity="0.10"/>
      <stop offset="1" stop-color="#06B6D4" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="panelStroke" x1="300" y1="208" x2="1400" y2="930" gradientUnits="userSpaceOnUse">
      <stop stop-color="#334155"/>
      <stop offset="1" stop-color="#1F2937"/>
    </linearGradient>
    <linearGradient id="panelTop" x1="300" y1="208" x2="1400" y2="208" gradientUnits="userSpaceOnUse">
      <stop stop-color="#38BDF8" stop-opacity="0.18"/>
      <stop offset="0.5" stop-color="#A78BFA" stop-opacity="0.08"/>
      <stop offset="1" stop-color="#34D399" stop-opacity="0.14"/>
    </linearGradient>
    <linearGradient id="spineGlow" x1="238" y1="214" x2="238" y2="962" gradientUnits="userSpaceOnUse">
      <stop stop-color="#22D3EE"/>
      <stop offset="0.5" stop-color="#818CF8"/>
      <stop offset="1" stop-color="#34D399"/>
    </linearGradient>
    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="panelShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feOffset dy="10"/>
      <feGaussianBlur stdDeviation="16" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="0 0 0 0 0.02 0 0 0 0 0.05 0 0 0 0 0.10 0 0 0 0.45 0"/>
      <feBlend in="SourceGraphic" mode="normal"/>
    </filter>
    <filter id="nodeGlow" x="-200%" y="-200%" width="400%" height="400%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <marker id="arrow" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M0 0 L10 4 L0 8 Z" fill="#64748B"/>
    </marker>
    <marker id="arrowCyan" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M0 0 L10 4 L0 8 Z" fill="#22D3EE"/>
    </marker>
    <style>
      .eyebrow { font: 700 13px Inter, Segoe UI, Arial, sans-serif; letter-spacing: 0.18em; fill: #67E8F9; }
      .title { font: 700 44px Inter, Segoe UI, Arial, sans-serif; fill: #F8FAFC; letter-spacing: -0.02em; }
      .subtitle { font: 500 20px Inter, Segoe UI, Arial, sans-serif; fill: #94A3B8; }
      .label { font: 700 12px Inter, Segoe UI, Arial, sans-serif; fill: #94A3B8; letter-spacing: 0.14em; }
      .layerTag { font: 700 11px Inter, Segoe UI, Arial, sans-serif; letter-spacing: 0.18em; fill: #67E8F9; }
      .layerTitle { font: 700 19px Inter, Segoe UI, Arial, sans-serif; fill: #F8FAFC; }
      .layerText { font: 500 13px Inter, Segoe UI, Arial, sans-serif; fill: #CBD5E1; }
      .micro { font: 700 11px Inter, Segoe UI, Arial, sans-serif; letter-spacing: 0.15em; }
      .flow { font: 600 13px Inter, Segoe UI, Arial, sans-serif; fill: #E2E8F0; }
      .spine { font: 700 12px Inter, Segoe UI, Arial, sans-serif; fill: #94A3B8; letter-spacing: 0.14em; }
    </style>
  </defs>

  <rect width="1600" height="1120" rx="24" fill="url(#bg)"/>
  <rect width="1600" height="1120" rx="24" fill="url(#glowA)"/>
  <rect width="1600" height="1120" rx="24" fill="url(#glowB)"/>

  <g>
    <text x="96" y="122" class="eyebrow">ARCHITECTURE OVERVIEW</text>
    <text x="96" y="186" class="title">Five layers from product intent to audited delivery</text>
    <text x="96" y="230" class="subtitle">BMAD orchestrates product and story work. Speckit structures technical execution. Audit gates prevent silent drift between stages.</text>
    <text x="332" y="218" class="micro" fill="#64748B">Input: Product Brief</text>
    <text x="1150" y="978" class="micro" fill="#64748B">Output: PR merged</text>
  </g>

  <g opacity="0.9">
    <rect x="164" y="206" width="52" height="768" rx="26" fill="#0F172A" stroke="#1E293B"/>
    <path d="M190 226V954" stroke="#334155" stroke-width="2"/>
    <path d="M238 214V962" stroke="#1E293B" stroke-width="2"/>
    <path d="M238 214V962" stroke="#334155" stroke-width="5" stroke-linecap="round" stroke-dasharray="1 18"/>
    <path d="M238 214V962" stroke="url(#spineGlow)" stroke-opacity="0.58" stroke-width="3" stroke-linecap="round" filter="url(#softGlow)"/>
    <circle cx="238" cy="266" r="6" fill="#22D3EE" filter="url(#nodeGlow)"/>
    <circle cx="238" cy="408" r="6" fill="#38BDF8" filter="url(#nodeGlow)"/>
    <circle cx="238" cy="558" r="6" fill="#A78BFA" filter="url(#nodeGlow)"/>
    <circle cx="238" cy="730" r="6" fill="#2DD4BF" filter="url(#nodeGlow)"/>
    <circle cx="238" cy="916" r="6" fill="#34D399" filter="url(#nodeGlow)"/>
  </g>

  <g>
    <text x="182" y="270" class="spine">L1</text>
    <text x="182" y="412" class="spine">L2</text>
    <text x="182" y="562" class="spine">L3</text>
    <text x="182" y="734" class="spine">L4</text>
    <text x="182" y="920" class="spine">L5</text>
  </g>

  <g opacity="0.36">
    <path d="M244 266H300" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>
    <path d="M244 408H300" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>
    <path d="M244 558H300" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>
    <path d="M244 730H300" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>
    <path d="M244 916H300" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>
  </g>

  <g stroke="#64748B" stroke-width="2" fill="none" opacity="0.6">
    <path d="M270 324 L270 348" marker-end="url(#arrow)"/>
    <path d="M270 466 L270 498" marker-end="url(#arrow)"/>
    <path d="M270 618 L270 670" marker-end="url(#arrow)"/>
    <path d="M270 836 L270 856" marker-end="url(#arrow)"/>
  </g>

  <g filter="url(#panelShadow)">
    <rect x="300" y="210" width="1180" height="112" rx="18" fill="#111827" stroke="url(#panelStroke)"/>
    <path d="M322 211H1458" stroke="url(#panelTop)" stroke-width="2" stroke-linecap="round"/>
  </g>
  <text x="332" y="248" class="layerTag">LAYER 1 · PRODUCT DEFINITION</text>
  <text x="332" y="280" class="layerTitle">Product Brief → Complexity Evaluation → PRD → Architecture</text>
  <text x="332" y="306" class="layerText">Party Mode is conditional. Path scales from no Party Mode to 50–80 rounds plus expert review.</text>
  <g transform="translate(1180 272)">
    <rect x="-62" y="-15" width="124" height="30" rx="15" fill="#082F49" stroke="#38BDF8" stroke-opacity="0.55"/>
    <text x="0" y="4" text-anchor="middle" class="micro" fill="#67E8F9">COMPLEXITY GATE</text>
  </g>
  <g transform="translate(1320 272)">
    <rect x="-72" y="-15" width="144" height="30" rx="15" fill="#1E1B4B" stroke="#A78BFA" stroke-opacity="0.55"/>
    <text x="0" y="4" text-anchor="middle" class="micro" fill="#C4B5FD">PRD / ARCH AUDIT</text>
  </g>

  <g filter="url(#panelShadow)">
    <rect x="300" y="352" width="1180" height="112" rx="18" fill="#111827" stroke="url(#panelStroke)"/>
    <path d="M322 353H1458" stroke="url(#panelTop)" stroke-width="2" stroke-linecap="round"/>
  </g>
  <text x="332" y="390" class="layerTag">LAYER 2 · EPIC / STORY PLANNING</text>
  <text x="332" y="422" class="layerTitle">create-epics-and-stories → Epic list / Story list / dependency map</text>
  <text x="332" y="448" class="layerText">Worktree granularity: 1–2 stories → story-level; 3+ → epic-level worktrees.</text>
  <g transform="translate(1160 414)">
    <rect x="-56" y="-15" width="112" height="30" rx="15" fill="#082F49" stroke="#22D3EE" stroke-opacity="0.55"/>
    <text x="0" y="4" text-anchor="middle" class="micro" fill="#67E8F9">PLANNING</text>
  </g>
  <g transform="translate(1310 414)">
    <rect x="-76" y="-15" width="152" height="30" rx="15" fill="#1E293B" stroke="#94A3B8" stroke-opacity="0.45"/>
    <text x="0" y="4" text-anchor="middle" class="micro" fill="#E2E8F0">WORKTREE DECISION</text>
  </g>

  <g filter="url(#panelShadow)">
    <rect x="300" y="502" width="1180" height="122" rx="18" fill="#111827" stroke="url(#panelStroke)"/>
    <path d="M322 503H1458" stroke="url(#panelTop)" stroke-width="2" stroke-linecap="round"/>
  </g>
  <text x="332" y="540" class="layerTag">LAYER 3 · STORY DEVELOPMENT</text>
  <text x="332" y="572" class="layerTitle">Create Story → Party Mode → Story document → 1st Audit</text>
  <text x="332" y="598" class="layerText">Party Mode refines when complex. Story doc must pass 1st review before implementation.</text>
  <g transform="translate(1080 564)">
    <rect x="-58" y="-15" width="116" height="30" rx="15" fill="#082F49" stroke="#38BDF8" stroke-opacity="0.55"/>
    <text x="0" y="4" text-anchor="middle" class="micro" fill="#67E8F9">PARTY MODE</text>
  </g>
  <g transform="translate(1210 564)">
    <rect x="-54" y="-15" width="108" height="30" rx="15" fill="#312E81" stroke="#A78BFA" stroke-opacity="0.55"/>
    <text x="0" y="4" text-anchor="middle" class="micro" fill="#C4B5FD">STORY DOC</text>
  </g>
  <g transform="translate(1330 564)">
    <rect x="-50" y="-15" width="100" height="30" rx="15" fill="#052E2B" stroke="#2DD4BF" stroke-opacity="0.6"/>
    <text x="0" y="4" text-anchor="middle" class="micro" fill="#99F6E4">1ST AUDIT</text>
  </g>

  <g filter="url(#panelShadow)">
    <rect x="300" y="674" width="1180" height="162" rx="18" fill="#111827" stroke="url(#panelStroke)"/>
    <path d="M322 675H1458" stroke="url(#panelTop)" stroke-width="2" stroke-linecap="round"/>
  </g>
  <text x="332" y="712" class="layerTag">LAYER 4 · TECHNICAL IMPLEMENTATION</text>
  <text x="332" y="744" class="layerTitle">Nested speckit-workflow with mandatory stage audits</text>
  <text x="332" y="770" class="layerText">specify → plan → GAPS → tasks → TDD. Code-review and audit enforced §1–§5.</text>

  <g transform="translate(448 792)">
    <circle r="8" fill="#0F172A" stroke="#22D3EE" stroke-width="3" filter="url(#nodeGlow)"/>
    <text x="0" y="38" text-anchor="middle" class="flow">specify</text>
  </g>
  <g transform="translate(628 792)">
    <circle r="8" fill="#0F172A" stroke="#38BDF8" stroke-width="3" filter="url(#nodeGlow)"/>
    <text x="0" y="38" text-anchor="middle" class="flow">plan</text>
  </g>
  <g transform="translate(808 792)">
    <circle r="8" fill="#0F172A" stroke="#818CF8" stroke-width="3" filter="url(#nodeGlow)"/>
    <text x="0" y="38" text-anchor="middle" class="flow">GAPS</text>
  </g>
  <g transform="translate(988 792)">
    <circle r="8" fill="#0F172A" stroke="#A78BFA" stroke-width="3" filter="url(#nodeGlow)"/>
    <text x="0" y="38" text-anchor="middle" class="flow">tasks</text>
  </g>
  <g transform="translate(1168 792)">
    <circle r="8" fill="#0F172A" stroke="#2DD4BF" stroke-width="3" filter="url(#nodeGlow)"/>
    <text x="0" y="38" text-anchor="middle" class="flow">TDD</text>
  </g>

  <path d="M456 792 L1160 792" stroke="#334155" stroke-width="2" marker-end="url(#arrowCyan)"/>
  <path d="M456 792 L1160 792" stroke="#22D3EE" stroke-opacity="0.55" stroke-width="3" marker-end="url(#arrowCyan)" filter="url(#softGlow)"/>

  <g transform="translate(538 808)">
    <rect x="-38" y="-14" width="76" height="28" rx="14" fill="#052E2B" stroke="#2DD4BF" stroke-opacity="0.6"/>
    <text x="0" y="4" text-anchor="middle" class="micro" fill="#99F6E4">§1</text>
  </g>
  <g transform="translate(718 808)">
    <rect x="-38" y="-14" width="76" height="28" rx="14" fill="#052E2B" stroke="#2DD4BF" stroke-opacity="0.6"/>
    <text x="0" y="4" text-anchor="middle" class="micro" fill="#99F6E4">§2</text>
  </g>
  <g transform="translate(898 808)">
    <rect x="-38" y="-14" width="76" height="28" rx="14" fill="#052E2B" stroke="#2DD4BF" stroke-opacity="0.6"/>
    <text x="0" y="4" text-anchor="middle" class="micro" fill="#99F6E4">§3</text>
  </g>
  <g transform="translate(1078 808)">
    <rect x="-38" y="-14" width="76" height="28" rx="14" fill="#052E2B" stroke="#2DD4BF" stroke-opacity="0.6"/>
    <text x="0" y="4" text-anchor="middle" class="micro" fill="#99F6E4">§4</text>
  </g>
  <g transform="translate(1258 808)">
    <rect x="-38" y="-14" width="76" height="28" rx="14" fill="#052E2B" stroke="#2DD4BF" stroke-opacity="0.6"/>
    <text x="0" y="4" text-anchor="middle" class="micro" fill="#99F6E4">§5</text>
  </g>

  <g filter="url(#panelShadow)">
    <rect x="300" y="860" width="1180" height="112" rx="18" fill="#111827" stroke="url(#panelStroke)"/>
    <path d="M322 861H1458" stroke="url(#panelTop)" stroke-width="2" stroke-linecap="round"/>
  </g>
  <text x="332" y="898" class="layerTag">LAYER 5 · FINISH</text>
  <text x="332" y="930" class="layerTitle">Batch Push → PR generation → mandatory human review → post-implementation audit</text>
  <text x="332" y="956" class="layerText">Closes only after human review and post-implementation audit pass.</text>
  <g transform="translate(1100 922)">
    <rect x="-34" y="-14" width="68" height="28" rx="14" fill="#082F49" stroke="#38BDF8" stroke-opacity="0.55"/>
    <text x="0" y="4" text-anchor="middle" class="micro" fill="#67E8F9">PUSH</text>
  </g>
  <g transform="translate(1186 922)">
    <rect x="-24" y="-14" width="48" height="28" rx="14" fill="#1E1B4B" stroke="#818CF8" stroke-opacity="0.55"/>
    <text x="0" y="4" text-anchor="middle" class="micro" fill="#C7D2FE">PR</text>
  </g>
  <g transform="translate(1290 922)">
    <rect x="-62" y="-14" width="124" height="28" rx="14" fill="#1E293B" stroke="#94A3B8" stroke-opacity="0.45"/>
    <text x="0" y="4" text-anchor="middle" class="micro" fill="#E2E8F0">HUMAN REVIEW</text>
  </g>
  <g transform="translate(1364 922)">
    <rect x="-74" y="-14" width="148" height="28" rx="14" fill="#052E2B" stroke="#2DD4BF" stroke-opacity="0.6"/>
    <text x="0" y="4" text-anchor="middle" class="micro" fill="#99F6E4">POST-IMPL §5 AUDIT</text>
  </g>
</svg>
