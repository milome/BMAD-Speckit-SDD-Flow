# BMAD Story Assistant 审计粒度配置示例
# 完整配置文件模板

version: "1.0"

# 审计粒度配置
audit_granularity:
  # 可选值: full | story | epic
  # 优先级: CLI参数 > 环境变量 > 本配置 > 默认(full)
  mode: "epic"

  # 各粒度模式详细配置
  modes:
    # ============ FULL 模式 ============
    # 全流程审计 - 所有阶段都执行严格审计
    full:
      name: "全流程审计"
      description: "所有阶段都执行严格审计（默认模式）"
      stages:
        # Layer 3: Story 级
        story_create:    { audit: true,  strictness: "standard" }
        story_audit:     { audit: true,  strictness: "standard" }

        # Layer 4: 技术实现层
        specify:         { audit: true,  strictness: "standard" }
        plan:            { audit: true,  strictness: "standard" }
        gaps:            { audit: true,  strictness: "standard" }
        tasks:           { audit: true,  strictness: "standard" }
        implement:       { audit: true,  strictness: "strict" }

        # Layer 5: 实施后审计
        post_audit:      { audit: true,  strictness: "strict" }

        # Layer 2: Epic 级（不适用）
        epic_create:     { audit: false }
        epic_complete:   { audit: false }

    # ============ STORY 模式 ============
    # Story级轻量审计 - 仅在Story创建和实施后执行审计
    story:
      name: "Story级轻量审计"
      description: "仅在Story创建和实施后执行审计，中间阶段只做验证"
      stages:
        # Layer 3: Story 级（执行审计）
        story_create:
          audit: true
          strictness: "standard"

        story_audit:
          audit: true
          strictness: "standard"

        # Layer 4: 技术实现层（跳过审计，只生成文档+验证）
        specify:
          audit: false
          generate_doc: true
          validation: "basic"
          checks:
            - document_exists
            - schema_valid
            - required_sections

        plan:
          audit: false
          generate_doc: true
          validation: "basic"
          checks:
            - document_exists
            - schema_valid
            - required_sections

        gaps:
          audit: false
          generate_doc: true
          validation: "basic"
          checks:
            - document_exists
            - gap_items_defined

        tasks:
          audit: false
          generate_doc: true
          validation: "basic"
          checks:
            - document_exists
            - task_list_complete

        implement:
          audit: false
          generate_doc: true
          validation: "test_only"
          checks:
            - all_tests_pass
            - lint_no_errors
            - document_exists

        # Layer 5: 实施后审计（执行审计）
        post_audit:
          audit: true
          strictness: "strict"
          checks:
            - tdd_evidence
            - ralph_method_compliance
            - code_quality
            - integration_tests

        # Layer 2: Epic 级（不适用）
        epic_create:     { audit: false }
        epic_complete:   { audit: false }

    # ============ EPIC 模式 ============
    # Epic级综合审计 - 仅在Epic创建和完成后执行审计
    epic:
      name: "Epic级综合审计"
      description: "仅在Epic创建和完成后执行审计，Story级只做文档生成"
      stages:
        # Layer 3: Story 级（全部跳过审计）
        story_create:
          audit: false
          generate_doc: true
          validation: null  # 不做任何验证

        story_audit:
          audit: false
          generate_doc: true
          validation: null

        # Layer 4: 技术实现层（全部跳过审计）
        specify:
          audit: false
          generate_doc: true
          validation: null

        plan:
          audit: false
          generate_doc: true
          validation: null

        gaps:
          audit: false
          generate_doc: true
          validation: null

        tasks:
          audit: false
          generate_doc: true
          validation: null

        implement:
          audit: false
          generate_doc: true
          validation: "test_only"  # 确保测试通过
          checks:
            - all_tests_pass
            - lint_no_errors

        # Layer 5: 实施后审计（跳过，由Epic级审计替代）
        post_audit:
          audit: false

        # Layer 2: Epic 级（执行审计）
        epic_create:
          audit: true
          strictness: "standard"
          optional: true  # 可选执行
          checks:
            - epic_scope_clarity
            - story_split_reasonableness
            - cross_story_dependencies
            - epic_architecture_feasibility

        epic_complete:
          audit: true
          strictness: "strict"  # Epic完成必须严格审计
          required_rounds: 3    # 连续3轮无gap
          checks:
            # 六维度审计
            cross_story_consistency:
              weight: 25
              checks:
                - api_contract_consistency
                - data_model_conflict_check
                - shared_component_unification
                - naming_convention_consistency

            epic_architecture_compliance:
              weight: 20
              checks:
                - architecture_design_alignment
                - tech_stack_compliance
                - scalability_requirement
                - performance_target

            integration_completeness:
              weight: 25
              checks:
                - cross_story_interface_integration
                - data_flow_completeness
                - end_to_end_functionality
                - boundary_condition_handling

            comprehensive_code_quality:
              weight: 15
              checks:
                - full_code_quality_assessment
                - duplicate_code_detection
                - architecture_consistency
                - security_vulnerability_scan

            comprehensive_test_coverage:
              weight: 10
              checks:
                - epic_level_integration_tests
                - cross_story_end_to_end_tests
                - performance_tests
                - regression_test_completeness

            documentation_completeness:
              weight: 5
              checks:
                - all_story_docs_complete
                - api_documentation
                - deployment_documentation
                - user_documentation

# Auto-continue 配置
# 仅当显式启用时，bmad-master 才会根据 handoff.next_action + ready=true 自动续跑
auto_continue:
  enabled: false
  require_ready_flag: true
  require_next_action: true
  source_priority:
    - cli
    - env
    - file
    - default

# 验证级别详细配置
validation_levels:
  # 基础验证
  basic:
    description: "基础文档验证"
    checks:
      - name: document_exists
        description: "文档存在性检查"
        required: true

      - name: schema_valid
        description: "基本结构检查"
        required: true

      - name: required_sections
        description: "必需章节检查"
        required: true

  # 仅测试验证
  test_only:
    description: "仅测试验证"
    checks:
      - name: all_tests_pass
        description: "所有测试通过"
        required: true

      - name: lint_no_errors
        description: "Lint无错误"
        required: true

      - name: document_exists
        description: "文档存在"
        required: true

  # 完整验证（audit: false时使用）
  full_validation:
    description: "完整验证（不审计）"
    checks:
      - name: document_exists
        required: true

      - name: schema_valid
        required: true

      - name: content_completeness
        required: true

      - name: cross_reference_valid
        required: true

# 审计收敛配置（与现有 audit-config-schema.md 兼容）
audit_convergence:
  default: "standard"

  strict:
    description: "严格模式"
    rounds: 3
    no_gap_required: true
    critical_auditor_ratio: 0.5
    applicable_stages:
      - implement
      - post_audit
      - epic_complete

  standard:
    description: "标准模式"
    rounds: 1
    no_gap_required: false
    critical_auditor_ratio: 0.5
    applicable_stages:
      - story_audit
      - specify
      - plan
      - gaps
      - tasks
      - epic_create

# 通知配置
notifications:
  # 当审计被跳过时通知用户
  when_audit_skipped: true

  # 当 Epic 完成时通知
  when_epic_completed: true

  # 当验证失败时通知
  when_validation_failed: true

# 报告路径配置
report_paths:
  # Story 级审计报告
  story_audit: "_bmad-output/implementation-artifacts/epic-{epic}-{epic-slug}/story-{story}-{slug}/AUDIT_story-{epic}-{story}.md"

  # Layer 4 审计报告
  specify:   "specs/epic-{epic}-{epic-slug}/story-{story}-{slug}/AUDIT_spec-E{epic}-S{story}.md"
  plan:      "specs/epic-{epic}-{epic-slug}/story-{story}-{slug}/AUDIT_plan-E{epic}-S{story}.md"
  gaps:      "specs/epic-{epic}-{epic-slug}/story-{story}-{slug}/AUDIT_GAPS-E{epic}-S{story}.md"
  tasks:     "specs/epic-{epic}-{epic-slug}/story-{story}-{slug}/AUDIT_tasks-E{epic}-S{story}.md"
  implement: "specs/epic-{epic}-{epic-slug}/story-{story}-{slug}/AUDIT_implement-E{epic}-S{story}.md"

  # Stage 4 实施后审计报告
  post_audit: "_bmad-output/implementation-artifacts/epic-{epic}-{epic-slug}/story-{story}-{slug}/AUDIT_Story_{epic}-{story}_stage4.md"

  # Epic 级审计报告
  epic_create:   "_bmad-output/epic-{epic}-{epic-slug}/AUDIT_Epic_{epic}_create.md"
  epic_complete: "_bmad-output/epic-{epic}-{epic-slug}/AUDIT_Epic_{epic}.md"
  epic_completion_report: "_bmad-output/epic-{epic}-{epic-slug}/EPIC_COMPLETION_REPORT.md"

# 环境特定配置（可选覆盖）
environment_overrides:
  cursor:
    subagent_tool: "mcp_task"
    default_subagent_type: "generalPurpose"

  claude:
    subagent_tool: "Agent"
    default_subagent_type: "general-purpose"

# 使用示例
# ==========
#
# 1. 使用默认 full 模式（所有阶段审计）
#    audit_granularity:
#      mode: "full"
#
# 2. 使用 story 模式（轻量级审计）
#    audit_granularity:
#      mode: "story"
#
# 3. 使用 epic 模式（仅Epic级审计）
#    audit_granularity:
#      mode: "epic"
#
# 4. 自定义配置（覆盖特定阶段）
#    audit_granularity:
#      mode: "story"
#      modes:
#        story:
#          stages:
#            post_audit:
#              strictness: "standard"  # 覆盖为 standard（默认 strict）
