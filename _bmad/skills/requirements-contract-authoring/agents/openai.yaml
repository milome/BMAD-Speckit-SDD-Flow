interface:
  display_name: "Requirements Contract Authoring"
  short_description: "Create confirmation-ready source requirement blocks"
  default_prompt: "Use $requirements-contract-authoring to create or update a confirmation-ready implementation source document with an inline implementationConfirmation block, ID-bound views, artifact plan, traceRows, evidence, failure paths, and pre-render completeness checks. Do not create a separate authoritative requirements contract."

policy:
  allow_implicit_invocation: true
