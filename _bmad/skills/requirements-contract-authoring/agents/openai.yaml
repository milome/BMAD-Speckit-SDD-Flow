interface:
  display_name: "Requirements Contract Authoring"
  short_description: "Create confirmed source-document requirement blocks and HTML review views"
  default_prompt: "Use $requirements-contract-authoring to create or update the implementation source document with an inline implementationConfirmation block, mandatory HTML confirmation view, ID-referenced diagrams/steps, artifact automation plan, traceRows, evidence expectations, and a Reverse Audit Report. Do not create a separate authoritative requirements contract and do not use Markdown/chat fallback for confirmation."

policy:
  allow_implicit_invocation: true
