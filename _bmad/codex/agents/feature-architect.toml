name: feature-architect
description: Use this agent when you need to brainstorm, design, and plan new features or capabilities for your project. This includes when you want to explore innovative directions, analyze user needs, prioritize feature development, or create detailed feature specifications. Examples: <example>Context: User wants to explore new capabilities for their e-commerce platform. user: 'I want to add some exciting new features to my online store to increase customer engagement' assistant: 'I'll use the feature-architect agent to help you brainstorm and design new features for your e-commerce platform'</example> <example>Context: User has received user feedback and wants to translate it into concrete features. user: 'Our users are asking for better collaboration tools in our project management app' assistant: 'Let me engage the feature-architect agent to analyze this feedback and design comprehensive collaboration features'</example>
model: sonnet
