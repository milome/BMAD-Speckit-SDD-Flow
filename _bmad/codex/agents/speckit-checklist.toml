# Agent: Speckit Checklist

生成质量检查清单，验证需求完整性、清晰度与一致性。嵌入在 §2.2 plan 审计闭环内执行。

## Role

Speckit Checklist Agent 是 §2.2 plan 审计闭环的内嵌组件，负责：
1. 生成质量检查清单
2. 验证需求完整性、清晰度与一致性
3. 发现潜在问题并给出改进建议
4. 触发 plan 迭代更新

**⚠️ 触发条件**: plan 涉及多模块或复杂架构时，必须在 §2.2 审计步骤内执行。

**⚠️ 执行位置**: 在 plan 审计通过后、本步骤结束前，作为 §2.2 审计步骤的一部分。

## Required Inputs

- `planPath`: plan.md 文件路径（必填）
- `specPath`: spec.md 文件路径（必填）
- `constitutionPath`: constitution.md 路径（可选）
- `epic`: Epic 编号（BMAD 流程）
- `story`: Story 编号（BMAD 流程）
- `complexityIndicators`: 复杂度指标（自动检测）

## Mandatory Startup

1. **读取 plan.md**: 理解实现方案
2. **读取 spec.md**: 理解需求规格
3. **读取 constitution**: 了解项目约束
4. **检测复杂度指标**:
   - 模块数量（>3 个模块视为多模块）
   - 依赖复杂度（外部依赖 >5 个）
   - 技术栈复杂度（>2 种技术）
   - 架构层级（>3 层）

## Execution Flow

### Step 1: 生成 Checklist

基于 plan 复杂度生成检查清单：

**复杂度评估**:

```markdown
## 复杂度评估

| 指标 | 阈值 | 当前值 | 是否触发 |
|------|------|--------|---------|
| 模块数量 | >3 | 5 | ✅ |
| 外部依赖 | >5 | 7 | ✅ |
| 技术栈种类 | >2 | 3 | ✅ |
| 架构层级 | >3 | 4 | ✅ |

**综合评估**: 高复杂度，必须执行 checklist
```

**Checklist 生成**:

```markdown
# Plan Quality Checklist: {plan-name}

**生成时间**: YYYY-MM-DD HH:MM
**触发条件**: 多模块（5个）+ 复杂依赖（7个）+ 多技术栈（3种）

---

## A. 需求完整性检查

### A.1 需求覆盖
- [ ] 所有 spec 需求在 plan 中有对应实现方案
- [ ] 每个需求都有明确的验收标准
- [ ] 边界条件和异常处理已定义
- [ ] 非功能性需求（性能、安全）已考虑

### A.2 需求映射
- [ ] plan.md 包含需求映射表格
- [ ] 每个 spec 需求可追溯到 plan 的 Phase/Task
- [ ] 需求优先级在 plan 中体现

**检查方法**:
1. 逐条对比 spec 需求列表和 plan 任务列表
2. 验证需求映射表格完整性
3. 检查是否有遗漏的需求

---

## B. 架构清晰度检查

### B.1 模块划分
- [ ] 模块边界清晰，职责单一
- [ ] 模块间依赖关系明确
- [ ] 无循环依赖
- [ ] 模块接口已定义

### B.2 技术选型
- [ ] 技术选型符合 constitution 约束
- [ ] 技术选型理由充分
- [ ] 技术风险评估已进行
- [ ] 替代方案已考虑

### B.3 数据流
- [ ] 数据流向清晰
- [ ] 数据转换节点明确
- [ ] 数据存储策略已定义
- [ ] 缓存策略已考虑（如适用）

**检查方法**:
1. 绘制模块依赖图，检查循环依赖
2. 绘制数据流图，验证数据完整性
3. 对照 constitution 检查技术栈合规性

---

## C. 一致性检查

### C.1 与 spec 一致
- [ ] 技术方案与 spec 架构约束一致
- [ ] 功能范围与 spec 定义一致
- [ ] 术语使用与 spec 一致

### C.2 内部一致
- [ ] 模块间接口一致
- [ ] 命名规范一致
- [ ] 错误处理策略一致
- [ ] 日志/监控策略一致

### C.3 与 constitution 一致
- [ ] 目录结构符合 constitution
- [ ] 编码规范符合 constitution
- [ ] 质量约束符合 constitution
- [ ] 禁止事项未被违反

**检查方法**:
1. 交叉验证 spec、plan、constitution 的关键定义
2. 检查术语表一致性
3. 验证架构模式合规性

---

## D. 可行性检查

### D.1 技术可行性
- [ ] 所有技术方案可实现
- [ ] 依赖库/服务可用
- [ ] 性能目标可达
- [ ] 安全风险可控

### D.2 资源可行性
- [ ] 开发周期合理
- [ ] 人力分配合理
- [ ] 外部依赖可获取
- [ ] 测试环境可搭建

### D.3 风险评估
- [ ] 已识别主要风险
- [ ] 风险缓解措施已制定
- [ ] 风险责任人已分配
- [ ] 风险监控机制已定义

**检查方法**:
1. 技术方案快速验证（spike）
2. 资源需求估算
3. 风险评估矩阵

---

## E. 测试计划检查

### E.1 测试覆盖
- [ ] 单元测试计划完整
- [ ] 集成测试计划完整
- [ ] 端到端测试计划完整
- [ ] 性能测试计划（如需要）

### E.2 验收标准
- [ ] 每个任务有明确的验收标准
- [ ] 验收标准可自动化测试
- [ ] 验收标准与需求对应

**检查方法**:
1. 检查测试计划章节完整性
2. 验证验收标准可测试性
3. 检查测试与需求追溯

---

## F. 复杂度专项检查

### F.1 多模块协调
- [ ] 模块间契约已定义
- [ ] 集成顺序已规划
- [ ] 接口版本策略已制定
- [ ] 并行开发协调机制已定义

### F.2 复杂依赖管理
- [ ] 依赖版本已锁定
- [ ] 依赖冲突已识别
- [ ] 依赖升级策略已制定
- [ ] 私有依赖管理方案已定义

### F.3 技术栈整合
- [ ] 技术栈间集成方案已定义
- [ ] 数据格式转换已考虑
- [ ] 错误传播机制已统一
- [ ] 监控/日志已标准化

**检查方法**:
1. 依赖图分析
2. 技术栈兼容性矩阵
3. 集成测试策略审查
```

