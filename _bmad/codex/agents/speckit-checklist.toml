### Step 4: 决策与后续

**根据检查结果决策**:

```yaml
if 存在 P0 级别问题:
  action: 迭代修改 plan.md
  next: 重新执行 code-review 审计
  checklist_reuse: false  # 需要完整重跑

elif 存在 P1/P2 级别问题:
  action: 建议修改 plan.md
  next: 重新执行 code-review 审计
  checklist_reuse: true   # 可仅验证修改项

else:
  action: 通过
  next: 进入 §3 GAPS 阶段
  note: checklist 验证完成，质量达标
```

**触发重新审计**:

若发现问题需要修改 plan:

```bash
# 更新 plan.md 后，触发新一轮 §2.2 审计
claude-code --agent speckit-plan \\
  --mode audit-retry \\
  --planPath {planPath} \\
  --auditRound {N+1} \\
  --checklistReport CHECKLIST_plan-E{epic}-S{story}.md
```

## Checklist Rules

### 禁止事项

1. **禁止**: 在 plan 审计未通过时执行 checklist
2. **禁止**: checklist 发现问题后跳过修复直接进入下一阶段
3. **禁止**: 忽略 P0 级别问题（必须修复）
4. **禁止**: 对简单 plan（单模块、少依赖）强制执行 checklist
5. **禁止**: checklist 仅输出问题不给出改进建议

### 强制事项

1. **必须**: 基于 plan 复杂度动态生成 checklist（非固定模板）
2. **必须**: 每项检查都有明确的通过/失败标准
3. **必须**: 生成结构化的 checklist report
4. **必须**: 问题分级（P0/P1/P2）并给出修复建议
5. **必须**: 若发现问题，触发 plan 迭代和重新审计

### 触发条件判断

**必须执行 checklist**:
- 模块数量 > 3
- 外部依赖 > 5
- 技术栈种类 > 2
- 架构层级 > 3
- 涉及微服务拆分
- 涉及数据库迁移
- 涉及多团队协作

**可跳过 checklist**:
- 单模块简单功能
- 纯文档/配置任务
- Bug 修复（无架构变更）
- 已知技术栈的简单 CRUD

## Handoff

Checklist 完成后，发送 handoff 到 speckit-plan（主 Agent）：

```yaml
layer: 4
stage: checklist_complete
parent_stage: plan
checklistResult: pass|fail
artifacts:
  checklistReport: CHECKLIST_plan-E{epic}-S{story}.md
  issuesFound: 3
  p0Issues: 1
  p1Issues: 1
  p2Issues: 1
next_action: re_audit_plan|proceed_to_gaps
```

## Error Handling

| 错误场景 | 处理方式 |
|---------|---------|
| plan 审计未通过 | 报错：checklist 只能在审计通过后执行 |
| 复杂度检测失败 | 使用保守策略（执行完整 checklist） |
| 依赖图生成失败 | 跳过相关检查，记录警告 |
| 发现 P0 问题 | 必须修复，禁止跳过 |
| 超过 3 轮 checklist | Escalate 到 bmad-master |

## Example

