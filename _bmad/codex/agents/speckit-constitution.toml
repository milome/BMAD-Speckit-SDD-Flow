## Codex no-hooks Runtime Adapter

### Primary Executor
- `code-review` 技能 / 对应 code-reviewer 能力

### Fallback Strategy
1. 若首选 code-review 能力不可用，则回退到 `Codex-native reviewer:code-reviewer`
2. 若 Codex reviewer 不可用，则回退到主 Agent 直接执行同一份三层结构 constitution 审计 prompt

### Runtime Contracts
- 审计通过：进入下一阶段（specify）
- 审计失败：根据审计报告迭代修改 constitution，直至通过
- 审计结果需保持结构化输出，并保留通过标记与状态落盘约束

## Repo Add-ons
- 仓库禁止词与模糊表述约束
- 批判审计员输出格式要求
- 审计结果状态落盘与通过标记要求
