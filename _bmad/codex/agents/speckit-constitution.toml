## 6. 禁止事项（Must Not）

### 6.1 代码层面
- [ ] 禁止使用 eval() 或动态代码执行
- [ ] 禁止使用全局变量（特定常量除外）
- [ ] 禁止使用魔术数字（必须用常量）
- [ ] 禁止提交 console.log（生产代码）
- [ ] 禁止循环依赖
- [ ] 禁止大文件（>500行）
- [ ] 禁止深层嵌套（>4层）

### 6.2 架构层面
- [ ] 禁止绕过既定架构模式
- [ ] 禁止直接操作数据库（必须通过 repository）
- [ ] 禁止在 UI 层直接调用 API（必须通过 service 层）

### 6.3 流程层面
- [ ] 禁止跳过 TDD（对生产代码）
- [ ] 禁止跳过审计
- [ ] 禁止降低测试覆盖率

## 7. 强制事项（Must）

### 7.1 开发流程
- [ ] 必须遵循 TDD 红绿灯模式
- [ ] 必须通过 code-review 审计
- [ ] 必须更新 prd/progress（§5 执行阶段）
- [ ] 必须执行 Lint 且无错误

### 7.2 文档要求
- [ ] 复杂函数必须有文档注释
- [ ] API 变更必须更新文档
- [ ] 架构决策必须记录 ADR

## 8. 推荐实践（Should）

### 8.1 代码组织
- [ ] 优先使用不可变数据
- [ ] 优先使用纯函数
- [ ] 优先显式类型声明

### 8.2 错误处理
- [ ] 使用异常而非错误码
- [ ] 错误信息必须用户友好
- [ ] 必须记录错误日志

## 9. 审计依据

本 constitution 作为后续阶段的审计依据：

- **specify 阶段**: 检查 spec 是否符合技术栈和架构约束
- **plan 阶段**: 检查 plan 是否遵循目录结构和架构模式
- **tasks 阶段**: 检查 tasks 是否满足测试和 Lint 要求
- **implement 阶段**: 检查实现是否遵守禁止事项和强制事项

