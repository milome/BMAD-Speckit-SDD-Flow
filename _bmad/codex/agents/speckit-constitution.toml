# Constitution: User Management API

## 1. 项目概述

- **项目名称**: User Management API
- **项目类型**: API Service
- **项目目标**: 提供用户注册、认证、管理的 REST API
- **目标用户**: 前端应用、第三方集成商

## 2. 技术栈

### 2.1 运行时
- **语言**: TypeScript
- **版本**: 5.0+
- **运行时环境**: Node.js 20+

### 2.2 核心依赖
- **框架**: Express.js 4.x
- **数据库**: PostgreSQL 15
- **ORM**: Prisma
- **认证**: JWT (jsonwebtoken)
- **验证**: Zod

### 2.3 开发工具
- **包管理器**: pnpm
- **构建工具**: tsc
- **测试框架**: Vitest
- **Lint工具**: ESLint + Prettier
- **类型检查**: tsc --strict

## 3. 架构约束

### 3.1 架构模式
- **整体架构**: Layered Architecture (Controller → Service → Repository)
- **模块划分**: 按领域划分 (auth, user, permission)
- **数据流**: 单向：Request → Controller → Service → Repository → DB

### 3.2 目录结构
```
src/
├── controllers/    # HTTP 请求处理
├── services/       # 业务逻辑
├── repositories/   # 数据访问
├── middlewares/    # Express 中间件
├── models/         # 类型定义
├── utils/          # 工具函数
└── config/         # 配置文件
tests/
├── unit/           # 单元测试
├── integration/    # 集成测试
└── e2e/            # E2E 测试
```

### 3.3 接口契约
- **API 规范**: REST
- **数据格式**: JSON
- **认证方式**: JWT Bearer Token

## 4. 编码规范

### 4.1 命名规范
- **变量/函数**: camelCase
- **常量**: UPPER_SNAKE_CASE
- **类/接口**: PascalCase
- **文件**: kebab-case

### 4.2 代码风格
- **缩进**: 2 spaces
- **行长度**: 100 字符
- **引号**: single
- **分号**: required

### 4.3 注释规范
- **文件头**: 可选（简单文件可省略）
- **函数注释**: JSDoc（公开 API 必须）
- **复杂逻辑**: 必须注释说明

### 4.4 类型规范
- **严格模式**: 启用 strict
- **类型推断**: 允许，但复杂类型必须显式声明
- **any**: 禁止（用 unknown 替代）

## 5. 质量约束

### 5.1 测试要求
- **覆盖率**: 最低 80%（分支、函数、行、语句）
- **测试类型**: 单元 + 集成 + E2E
- **测试命名**: `should {expected_behavior} when {condition}`

### 5.2 Lint 要求
- **错误**: 0 errors
- **警告**: 0 warnings
- **忽略规则**: 仅允许特定文件（如 generated/）

### 5.3 性能约束
- **API 响应**: < 200ms (p95)
- **数据库查询**: < 50ms (p95)

