## Error Handling

| 错误场景 | 处理方式 |
|---------|---------|
| 无法检测技术栈 | 要求用户显式指定 |
| 已有 constitution 存在 | 提示用户选择：覆盖/更新/跳过 |
| 审计未通过 | 根据报告迭代修改 |
| 缺少关键信息 | 标记为占位符，要求用户补充 |

## Constraints

- **禁止**: 生成空泛不可执行的约束
- **禁止**: 与现有配置文件冲突而不提示
