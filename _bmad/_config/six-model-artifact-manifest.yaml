dashboard_projection:
  ownerModel: delivery_confirmation
  paths:
    - "_bmad-output/runtime/requirement-records/dashboard/<dashboard-id>/dashboard.md"
    - "_bmad-output/runtime/requirement-records/dashboard/<dashboard-id>/runtime-dashboard.json"
  inputArtifacts:
    - "_bmad-output/runtime/requirement-records/index.json"
    - "_bmad-output/runtime/requirement-records/artifact-index.json"
    - "_bmad-output/runtime/requirement-records/context/runtime-registry.json"
  outputArtifacts:
    - six_model_status_projection
  requiredFields:
    - generatedAt
    - sourceRequirementIndexHash
    - sourceArtifactIndexHash
    - models
    - requirement_confirmation
    - architecture_confirmation
    - implementation_readiness
    - execution_closure
    - audit_review
    - delivery_confirmation
  rule: "Projection only; dashboard status cannot close a requirement or replace Delivery Closeout Gate."

forbidden_completion_sources:
  - task_report_done_only
  - smoke_passed_only
  - quality_gate_passed_only
  - release_gate_passed_only
  - delivery_truth_passed_only
  - dashboard_health_score
  - agent_summary
