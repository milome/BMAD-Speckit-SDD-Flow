registry_rules:
  unregistered_script_policy: may_run_but_not_count_for_requirement_pass
  multi_model_rule: secondaryModels may receive projections; primary ownerModel controls recordEventTypes.
  completion_rule: No script except target main_agent_delivery_closeout_gate may close delivery.
  migration_rule: Useful scripts are retained as capability owners; old inputs, old outputs, and direct-control semantics are removed.
  active_requirement_resolution_rule: scripts must use explicit record args or resolve_active_requirement; no script may read _bmad-output/runtime/context/** as a control, fallback, or locator input.
  requirement_index_rule: _bmad-output/runtime/requirement-records/index.json is locator projection only; control state must be reloaded and verified from requirement-record.json.
script_behaviors_to_remove:
  - behaviorId: run_score_record_driven_sft_positive_samples
    affectedScripts:
      - scripts/sft-extract.ts
      - scripts/analytics-sft-extract.ts
    replacement: requirement-record sample routing plus canonical samples.
  - behaviorId: run_score_record_as_score_control_source
    affectedScripts:
      - scripts/parse-and-write-score.ts
    replacement: score materialization and score evaluation gateChecks under ResolvedScoringPolicy.
