version: 1
registry_id: script-owner-model-registry
owner: main-agent-orchestration
status: frozen
updated_at: "2026-05-16T20:34:15+08:00"
freeze_scope:
  - final_paths
  - retained_scripts
  - target_new_scripts
  - owner_models
  - input_artifacts
  - output_artifacts
  - record_event_types
description: >
  Canonical registry mapping retained scripts/configs to exactly one primary six-model owner.
  Scripts may emit evidence for secondary models, but only the primary owner controls the
  requirement-record event type written by ingest.
shared_required_fields:
  - scriptId
  - path
  - ownerModel
  - stage
  - producer
  - inputArtifacts
  - outputArtifacts
  - recordEventTypes
  - writesRuntimeState
  - writesRequirementEvidence
  - hookParityRequired
  - completionAuthority
completion_authority_values:
  none: May not claim completion.
  evidence_only: May produce evidence but not advance final state.
  main_agent_only: May request Main Agent state transition.
  delivery_closeout_gate_only: Only Delivery Closeout Gate may close delivery.
field_defaults:
  writesRuntimeState: false
  writesRequirementEvidence: false
  hookParityRequired: false
scripts:
  - scriptId: main_agent_orchestration
    path: scripts/main-agent-orchestration.ts
    ownerModel: execution_closure
    secondaryModels:
      - delivery_confirmation
    stage: runtime_orchestration
    producer: main_agent
    inputArtifacts:
      - ResolvedRuntimeContext
      - _bmad-output/runtime/requirement-records/<requirement-set-id>/requirement-record.json
      - _bmad-output/runtime/requirement-records/<requirement-set-id>/recovery/runtime-policy-snapshot.json
      - _bmad-output/runtime/requirement-records/<requirement-set-id>/recovery/recovery-context.json
      - _bmad-output/runtime/requirement-records/<requirement-set-id>/orchestration/orchestration-state/*.json
      - _bmad-output/runtime/requirement-records/<requirement-set-id>/prompts/prompt-packets/**
    outputArtifacts:
      - _bmad-output/runtime/requirement-records/<requirement-set-id>/orchestration/orchestration-state/*.json
      - _bmad-output/runtime/requirement-records/<requirement-set-id>/prompts/prompt-packets/**
    recordEventTypes:
      - execution_iteration_recorded
      - recovery_context_updated
    completionAuthority: main_agent_only
    writesRuntimeState: true
    writesRequirementEvidence: true
    hookParityRequired: true
