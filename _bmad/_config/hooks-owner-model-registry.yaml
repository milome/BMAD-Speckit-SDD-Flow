version: 1
registry_id: hooks-owner-model-registry
owner: main-agent-orchestration
status: frozen
updated_at: "2026-05-16T20:34:15+08:00"
freeze_scope:
  - final_paths
  - retained_hooks
  - no_hook_equivalents
  - owner_models
  - input_artifacts
  - output_artifacts
  - record_event_types
description: >
  Canonical registry mapping retained Claude/Cursor/shared runtime hooks and no-hook equivalents to
  six-model ownership. Hooks are event capture and routing surfaces only; they never close
  requirements directly.
shared_required_fields:
  - hookId
  - host
  - path
  - ownerModel
  - trigger
  - producer
  - inputArtifacts
  - outputArtifacts
  - recordEventTypes
  - writesRequirementEvidence
  - parityGroup
  - completionAuthority
completion_authority_values:
  none: May not claim completion.
  evidence_only: May produce process evidence only.
hook_rules:
  hooks_must_not_close_requirements: true
  hooks_must_emit_or_index_requirement_artifacts: true
  host_parity_oracle: Compare emitted envelopes after ingest, not raw hook text.
  requirement_related_outputs_must_enter_artifactIndex: true
  helper_hooks_without_requirement_events_are_allowed: true
hooks:
