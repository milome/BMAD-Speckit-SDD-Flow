      - architecture_confirmation
    trigger: runtime_policy_cli
    producer: runtime_policy_hook
    inputArtifacts:
      - runtime_context
      - runtime_policy_config
    outputArtifacts:
      - runtime_policy_payload
    recordEventTypes:
