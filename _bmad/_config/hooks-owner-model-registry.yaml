no_hook_equivalents:
  - equivalentId: codex_no_hooks_ingress
    host: codex
    ownerModel: execution_closure
    trigger: codex_cli_or_main_agent_ingress
    paths:
      - scripts/main-agent-unified-ingress.ts
      - scripts/main-agent-orchestration.ts
    inputArtifacts:
      - cli_invocation
      - workspace_context
      - runtime_context
    outputArtifacts:
      - _bmad-output/runtime/requirements/<requirement-set-id>/artifacts/unified-ingress-<run-id>.json
      - _bmad-output/runtime/governance/orchestration-state/*.json
    replacesHooks:
      - claude_session_start
      - cursor_runtime_dashboard_session_start
    recordEventTypes:
      - execution_iteration_recorded
      - recovery_context_updated
    completionAuthority: evidence_only
    writesRequirementEvidence: true
    parityGroup: session_start_context
  - equivalentId: codex_no_hooks_worker
    host: codex
    ownerModel: execution_closure
    trigger: codex_worker_dispatch
    paths:
      - scripts/main-agent-codex-worker-adapter.ts
      - _bmad/codex/agents/codex-no-hooks-worker.toml
    inputArtifacts:
      - governance_packet
      - runtime_context
    outputArtifacts:
      - _bmad-output/runtime/codex/logs/<packetId>.stdin.prompt.txt
      - _bmad-output/runtime/codex/logs/<packetId>.stdout.log
      - _bmad-output/runtime/codex/logs/<packetId>.stderr.log
      - task_report
    replacesHooks:
      - claude_post_tool_use
      - cursor_post_tool_use
      - shared_post_tool_use_core
    recordEventTypes:
      - task_report_ingested
      - execution_iteration_recorded
    completionAuthority: evidence_only
    writesRequirementEvidence: true
    parityGroup: tool_trace_capture
  - equivalentId: codex_no_hooks_result_ingest
    host: codex
    ownerModel: audit_review
    trigger: codex_execution_result_ingest
    paths:
      - scripts/governance-execution-result-ingestor.ts
      - scripts/governance-packet-reconciler.ts
    inputArtifacts:
      - execution_result
      - rerun_gate_result
      - governance_packet
      - task_report
    outputArtifacts:
      - execution_result_projection
      - rerun_gate_projection
      - reconciliation_report
    replacesHooks:
      - shared_governance_stage_event_emitter
      - shared_governance_packet_hard_closeout
    recordEventTypes:
      - audit_iteration_recorded
      - rerun_required
      - closeout_check_recorded
    completionAuthority: evidence_only
    writesRequirementEvidence: true
    parityGroup: execution_result_ingest
registry_rules:
  unregistered_hook_policy: may_emit_host_event_but_not_count_for_requirement_pass
  completion_rule: Hooks never set requirement-record status to closed.
  parity_rule: hooks-enabled and no-hook paths must converge after requirement-record ingest.
