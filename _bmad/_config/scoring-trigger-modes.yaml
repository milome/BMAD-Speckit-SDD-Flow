# Story 3.3: 触发模式表 writeMode 映射
# 与 Architecture §10.3、Story 3.1 触发模式表一致
# 覆盖 real_dev、eval_question 两种 scenario

version: "1.1"

# 审计通过后评分写入控制（Story 3.3 扩展）
scoring_write_control:
  enabled: true
  fail_policy: non_blocking
  scenario_source: context
  scenario_default: real_dev
  write_mode_lookup_order: [event.scenario, event.default]
  require_question_version_for_eval_question: true
  call_mapping:
    speckit_1_2_audit_pass:
      event: stage_audit_complete
      stage: speckit_1_2
    speckit_2_2_audit_pass:
      event: stage_audit_complete
      stage: speckit_2_2
    speckit_3_2_audit_pass:
      event: stage_audit_complete
      stage: speckit_3_2
    speckit_4_2_audit_pass:
      event: stage_audit_complete
      stage: speckit_4_2
    speckit_5_2_audit_pass:
      event: stage_audit_complete
      stage: speckit_5_2
    implement_audit_pass:
      event: stage_audit_complete
      stage: implement
    bmad_story_stage2_audit_pass:
      event: story_status_change
      stage: bmad_story_stage2
    bmad_story_stage4_audit_pass:
      event: story_status_change
      stage: bmad_story_stage4

# 事件类型 → 默认 writeMode
# writeMode 与 Story 1.2 的 single_file | jsonl | both 对应
event_to_write_mode:
  stage_audit_complete:
    default: single_file
    real_dev: single_file
    eval_question: single_file
  story_status_change:
    default: single_file
    real_dev: single_file
    eval_question: jsonl
  mr_created:
    default: single_file
    real_dev: single_file
    eval_question: jsonl
  epic_pending_acceptance:
    default: both
    real_dev: both
    eval_question: both
  user_explicit_request:
    default: single_file
    real_dev: single_file
    eval_question: single_file

# 与 _bmad/_config/stage-mapping.yaml trigger_modes 对应
# stage_audit_complete → 该 stage 对应环节，自动
# story_status_change → 环节 1–6，自动（可配置）
# mr_created → 环节 2–6，自动（可配置）
# epic_pending_acceptance → 环节 6、Epic 综合，手动或自动
# user_explicit_request → 全环节，手动
