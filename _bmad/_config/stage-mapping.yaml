# BMAD layer to stage mapping, scoring phase mapping, and trigger modes.
# Keep this file ASCII-safe: do not write it through PowerShell text pipelines.

version: "1.0"

layer_to_stages:
  layer_1:
    name: Product Definition Layer
    stages: [prd]
  layer_2:
    name: Architecture Layer
    stages: [arch]
  layer_3:
    name: Epic/Story Planning Layer
    stages: [epics, story]
  layer_4:
    name: Technical Implementation Layer
    stages: [specify, plan, gaps, tasks, implement]
  layer_5:
    name: Closeout Layer
    stages: [post_impl, pr_review, release_gate, delivery_truth_gate]
    closeout_stages: [post_audit, pr_review, release_gate, delivery_truth_gate]

stage_to_phase:
  prd: [1]
  arch: [1, 2]
  epics: [1]
  story: [1]
  specify: [1]
  plan: [1, 2]
  gaps: [1, 2, 3, 4, 5, 6]
  tasks: [2, 3, 4, 5]
  implement: [2, 3, 4, 5, 6]
  post_impl: [2, 3, 4, 5, 6]
  pr_review: [6]
  release_gate: [6]
  delivery_truth_gate: [6]

trigger_modes:
  - event: stage_audit_complete
    trigger: auto
    scope: matching stage scoring phases
  - event: story_status_change
    trigger: auto
    configurable: true
    scope: phases 1-6
  - event: mr_created
    trigger: auto
    configurable: true
    scope: phases 2-6
  - event: epic_pending_acceptance
    trigger: manual_or_auto
    scope: phase 6 and epic synthesis
  - event: user_explicit_request
    trigger: manual
    scope: all phases

runtime_flow_stage_to_trigger_stage:
  story:
    specify: speckit_1_2
    plan: speckit_2_2
    gaps: speckit_3_2
    tasks: speckit_4_2
    implement: speckit_5_2
    story_audit: bmad_story_stage2
    post_audit: bmad_story_stage4
    pr_review: bmad_story_stage6
    release_gate: bmad_story_stage6
    delivery_truth_gate: bmad_story_stage6
  bugfix:
    specify: speckit_1_2
    plan: speckit_2_2
    gaps: speckit_3_2
    tasks: speckit_4_2
    implement: speckit_5_2
    post_audit: bmad_story_stage4
  standalone_tasks:
    specify: speckit_1_2
    plan: speckit_2_2
    gaps: speckit_3_2
    tasks: speckit_4_2
    implement: implement
  epic:
    specify: speckit_1_2
    plan: speckit_2_2
    gaps: speckit_3_2
    tasks: speckit_4_2
    implement: speckit_5_2
