# BMAD Layer → 阶段（表 A）、阶段 → 评分环节（表 B）、触发模式表
# Architecture §3、§4、§10.3；Story 3.1 产出

version: "1.0"

# 表 A：BMAD Layer → 阶段
layer_to_stages:
  layer_1:
    name: 产品定义层
    stages: [prd, arch]
  layer_2:
    name: Epic/Story 规划层
    stages: [epics]
  layer_3:
    name: Story 开发层
    stages: [story]
  layer_4:
    name: 技术实现层
    stages: [specify, plan, gaps, tasks, implement]
  layer_5:
    name: 收尾层
    stages: [post_impl, pr_review]

# 表 B：阶段 → 评分环节（1–6）
stage_to_phase:
  prd: [1]
  arch: [1, 2]
  epics: [1]
  story: [1]
  specify: [1]
  plan: [1, 2]
  gaps: [1, 2, 3, 4, 5, 6]
  tasks: [2, 3, 4, 5]
  implement: [2, 3, 4, 5, 6]
  post_impl: [2, 3, 4, 5, 6]
  pr_review: [6]

# 触发模式表（Architecture §10.3）
trigger_modes:
  - event: stage_audit_complete
    trigger: auto
    scope: 该 stage 对应环节
  - event: story_status_change
    trigger: auto
    configurable: true
    scope: 环节 1–6
  - event: mr_created
    trigger: auto
    configurable: true
    scope: 环节 2–6
  - event: epic_pending_acceptance
    trigger: manual_or_auto
    scope: 环节 6、Epic 综合
  - event: user_explicit_request
    trigger: manual
    scope: 全环节

# Runtime Governance: (flow, stage) → scoring trigger_stage_id（与 scoring-trigger-modes call_mapping.stage 逐字对齐）
runtime_flow_stage_to_trigger_stage:
  story:
    specify: speckit_1_2
    plan: speckit_2_2
    gaps: speckit_3_2
    tasks: speckit_4_2
    implement: speckit_5_2
    story_audit: bmad_story_stage2
    post_audit: bmad_story_stage4
  bugfix:
    specify: speckit_1_2
    plan: speckit_2_2
    gaps: speckit_3_2
    tasks: speckit_4_2
    implement: speckit_5_2
    post_audit: bmad_story_stage4
  standalone_tasks:
    specify: speckit_1_2
    plan: speckit_2_2
    gaps: speckit_3_2
    tasks: speckit_4_2
    implement: implement
  epic:
    specify: speckit_1_2
    plan: speckit_2_2
    gaps: speckit_3_2
    tasks: speckit_4_2
    implement: speckit_5_2
