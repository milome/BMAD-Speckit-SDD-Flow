# code-reviewer多模式配置文件
# audit-prompts 多语言：locale 来自 _bmad-output/runtime/context/project.json → languagePolicy.resolvedMode（非 env）。解析见
# scripts/i18n/resolve-audit-prompt-path.ts；文件约定见 _bmad/_config/AUDIT_PROMPTS_STRATEGY.md（.md / .zh.md / .en.md）。
# GAP-009 修复：prompt_template 路径规则
# GAP-076 修复：prompt_template 路径解析优先级：(1) 相对于 config 文件所在目录；(2) 若不存在则 {SKILLS_ROOT}/speckit-workflow/references/
# GAP-025 修复：audit-prompts-*.md 为新建独立文件，与 speckit-workflow/references/audit-prompts.md 关系：
#   - audit-prompts.md §1-§5 对应 spec/plan/gaps/tasks/执行 审计；code 模式可复用或新建 audit-prompts-code.md
# GAP-048 修复：audit-prompts-code.md 与 audit-prompts.md 映射：code 模式对应 audit-prompts.md §5（执行 tasks 后审计）；若新建 audit-prompts-code.md 则其内容须覆盖 §5 要点
#   - prd/arch/pr 模式使用新建的 audit-prompts-prd.md、audit-prompts-arch.md、audit-prompts-pr.md
# GAP-026 修复：Cursor 通过读取本 config 按 mode 切换；若不支持多模式则降级为单一 code 模式+文档说明

modes:
  code:
    name: "代码审计"
    description: "审计代码文件的质量、规范、安全性"
    prompt_template: "audit-prompts-code.md"
    pass_criteria:
      A: "优秀，完全符合要求，可直接merge"
      B: "良好，minor问题，须在本阶段审计闭环内完成修复"
      C: "及格，需修改后重新审计"
      D: "不及格，严重问题，拒绝merge"
    dimensions:
      - name: "功能性"
        name_en: "Functionality"
        weight: 30
        checks:
          - "是否实现了需求"
          - "边界条件处理"
          - "错误处理"
      - name: "代码质量"
        name_en: "Code Quality"
        weight: 30
        checks:
          - "命名规范"
          - "代码复杂度"
          - "注释完整性"
      - name: "测试覆盖"
        name_en: "Test Coverage"
        weight: 20
        checks:
          - "单元测试"
          - "集成测试"
          - "边界测试"
          - "回归判定：实施前已存在用例若实施后失败须修复或正式排除；禁止以与本Story无关、与Story X 相关等理由排除"
      - name: "安全性"
        name_en: "Security"
        weight: 20
        checks:
          - "输入验证"
          - "敏感数据处理"
          - "常见漏洞检查"

  prd:
    name: "PRD审计"
    description: "审计产品需求文档的完整性和准确性"
    prompt_template: "audit-prompts-prd.md"
    pass_criteria:
      完全覆盖: "所有维度均满足"
      部分覆盖: "关键维度满足，次要可后续补充"
      不通过: "关键维度缺失"
    dimensions:
      - name: "需求完整性"
        name_en: "Requirements Completeness"
        weight: 35
        checks:
          - "覆盖所有用户场景"
          - "P0 journey 合同完整"
          - "journey evidence contract 完整"
          - "边界条件明确"
          - "异常流程考虑"
      - name: "可测试性"
        name_en: "Testability"
        weight: 25
        checks:
          - "验收标准明确"
          - "可验证"
          - "测试场景清晰"
          - "smoke E2E readiness"
          - "fixture / environment readiness"
      - name: "一致性"
        name_en: "Consistency"
        weight: 25
        checks:
          - "与Product Brief一致"
          - "内部逻辑自洽"
          - "术语统一"
          - "actor-permission-state matrix"
          - "failure matrix"
      - name: "可追溯性"
        name_en: "Traceability"
        weight: 15
        checks:
          - "需求有唯一ID"
          - "需求描述足够详细以便追溯"
          - "依赖关系明确"
          - "journey 到 epic/story traceability"
          - "证据合同可追溯"

  arch:
    name: "架构审计"
    description: "审计架构设计文档的技术可行性和合理性"
    prompt_template: "audit-prompts-arch.md"
    pass_criteria:
      完全覆盖: "所有维度均满足，Tradeoff记录完整"
      部分覆盖: "关键维度满足，Tradeoff基本完整"
      不通过: "关键维度缺失或Tradeoff未记录"
    dimensions:
      - name: "技术可行性"
        name_en: "Technical Feasibility"
        weight: 30
        checks:
          - "方案可实现"
          - "技术选型合理"
          - "资源需求明确"
          - "P0 journey key path 可实现"
          - "business completion state 已定义"
      - name: "扩展性"
        name_en: "Scalability"
        weight: 25
        checks:
          - "未来3年可持续"
          - "水平扩展能力"
          - "向后兼容"
          - "sync / async boundary 合理"
          - "failure handling / compensation 可扩展"
      - name: "安全性"
        name_en: "Security"
        weight: 25
        checks:
          - "威胁建模完整"
          - "安全控制措施"
          - "数据保护"
          - "actor / permission 约束承接"
          - "trace / audit 证据完整"
      - name: "成本效益"
        name_en: "Cost-Benefit"
        weight: 20
        checks:
          - "ROI合理"
          - "运维成本可控"
          - "人力成本估算"
          - "smoke E2E readiness 成本可承受"
          - "fixture / observability 合同可维护"

  pr:
    name: "PR审计"
    description: "审计Pull Request的合并就绪性"
    prompt_template: "audit-prompts-pr.md"
    pass_criteria:
      A: "所有维度优秀，可直接merge"
      B: "基本满足，minor问题须在本阶段审计闭环内完成修复"
      C: "存在问题，需修改后重新审计"
      D: "严重问题，拒绝merge"
    dimensions:
      - name: "CI状态"
        weight: 30
        checks:
          - "所有检查通过"
          - "无编译错误"
          - "测试通过率100%"
      - name: "代码审查"
        weight: 30
        checks:
          - "符合项目规范"
          - "无安全漏洞"
          - "性能影响评估"
      - name: "测试覆盖"
        weight: 20
        checks:
          - "新增代码有测试"
          - "覆盖率不下降"
          - "边界测试充分"
      - name: "影响评估"
        weight: 20
        checks:
          - "影响范围明确"
          - "兼容性考虑"
          - "回滚方案"

default_mode: "code"

# Story 2.1: items 与 veto_items 供 scoring/rules 通过 ref 引用
items:
  functional_correctness:
    name: "功能正确性"
    description: "核心逻辑正确，无功能缺陷"
  naming_conventions:
    name: "命名规范符合度"
    description: "命名清晰、符合项目规范"
  exception_handling:
    name: "异常处理完整性"
    description: "核心异常有处理"
  owasp_top10:
    name: "安全合规性(OWASP)"
    description: "无 OWASP Top 10 高危问题"
  complexity_maintainability:
    name: "复杂度与可维护性"
    description: "代码复杂度可控，可维护"
  test_coverage:
    name: "测试覆盖率"
    description: "单元测试覆盖核心逻辑"
  case_quality:
    name: "用例质量"
    description: "测试用例设计合理"
  regression_tests:
    name: "回归测试"
    description: "有回归测试保障"
  fix_correctness:
    name: "修复正确性"
    description: "Bug 修复正确"
  no_regression:
    name: "无回归"
    description: "修复不引入新问题"
  spec_coverage:
    name: "规范全覆盖"
    description: "Gaps 前置完整性"
  gap_definition:
    name: "Gap 定义清晰性"
    description: "Gap 描述清晰"
  risk_anticipation:
    name: "风险预判"
    description: "风险识别到位"
  journey_smoke_chain_contract:
    name: "Journey Smoke Task Chain 合同"
    description: "每个 Journey Slice 至少绑定一条 smoke task chain"
  journey_closure_task_contract:
    name: "Journey Closure Task 合同"
    description: "每个 Journey Slice 必须有 closure note task"
  journey_unlock_contract:
    name: "Journey Unlock 合同"
    description: "setup/foundation 任务必须显式说明 unlocks 哪条 journey / smoke path"
  journey_gap_split_contract:
    name: "Journey Gap Split 合同"
    description: "Journey Slice 规则必须保持 definition gap 与 implementation gap 分离"
  journey_shared_path_reference:
    name: "Shared Ledger Path Reference 合同"
    description: "multi-agent 模式必须共享同一份 journey ledger / invariant ledger / trace map 路径引用"

veto_items:
  veto_core_logic:
    name: "核心逻辑错误"
    consequence: "stage_0_level_down"
  veto_owasp_high:
    name: "OWASP 高危安全问题"
    consequence: "stage_0_level_down"
  veto_compile:
    name: "编译失败"
    consequence: "stage_0_level_down"
  veto_cwe798:
    name: "硬编码敏感信息(CWE-798)"
    consequence: "stage_0_level_down"
  veto_core_unmapped:
    name: "核心需求>20%未映射"
    consequence: "gaps_pre_0_veto"
  veto_gaps_conflict:
    name: "gaps 与规范冲突"
    consequence: "gaps_pre_0_veto"
