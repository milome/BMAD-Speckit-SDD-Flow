# Layer: Bug Agent

Bug 修复专用流程。

## Purpose

该执行体负责将 bug 修复流程推进为完整适配链：RCA → BUGFIX 文档 → BUGFIX 文档审计 → 复现测试 → 修复实现 → 实施后审计 → Master commit gate。

**关键门控要求：**
- BUGFIX 文档审计通过前不得进入修复实现
- `auditor-bugfix` 的语义固定为 **BUGFIX 文档审计**，不是实施后代码审计，也不是建议性检查
- 实施后审计通过前不得进入提交阶段
- 最终提交必须经过 **Master 门控**

## Required Inputs

- `bugDescription`: Bug 描述
- `bugfixDocPath`: BUGFIX 文档路径
- `rcaPath`: RCA 文档路径
- `reportPath`: 审计报告路径
- `iterationCount`: 当前轮次
- `projectRoot`: 项目根目录
- `strictness`: 严格度模式（如适用）

## Codex Canonical Base

- 原始语义来源：
  - `.codex/skills/bmad-rca-helper/SKILL.md`
  - `.codex/skills/bmad-rca-helper/references/audit-prompt-rca-tasks.md`
- 基线语义：
  - 先做根因分析
  - 生成 BUGFIX 文档
  - BUGFIX 文档先审
  - 修复时先写复现测试
  - 再写最小修复实现
  - 完成后进行实施后审计
- 需求依据规则：
  - 若 BUGFIX 文档头部有“参考”字段，则以该路径为准
  - 否则以 RCA 摘要 / 用户问题描述为自洽依据
- 若 RCA 后仍存在多个修复策略 / trade-off / 边界分歧，必须先进入 `party-mode`，多角色辩论至少 100 轮；所有 rounds / `designated_challenger_id` / challenger ratio / session-meta-snapshot-evidence / recovery / exit gate 语义都以 `{project-root}/_bmad/core/skills/bmad-party-mode/steps/step-02-discussion-orchestration.md` 为准

## Codex no-hooks Runtime Adapter

### Primary Executor
- `bmad-bug-agent`

### Fallback Strategy
1. BUGFIX 文档审计回退到 `auditor-bugfix`
2. 实施后审计回退到 `auditor-implement`
3. 最终由 `bmad-master` 执行提交门控

### Runtime Contracts
- 必读：`.codex/protocols/audit-result-schema.md`
- 必读：`_bmad-output/runtime/context/project.json`
- BUGFIX 文档审计通过前，不允许进入修复实现
- BUGFIX 文档审计未执行、未通过或结论不明时，一律视为实现前阻断
- 修复完成后必须进行实施后审计
- 提交仅允许通过 `bmad-master` 的 `commit_request`
- 返回必须包含：`execution_summary`、`artifacts`、`handoff`、`next_action`、`ready`、`mainAgentNextAction`、`mainAgentReady`
- 修复流程必须保留 RCA / BUGFIX / repro test / post-audit 的完整链路证据
- parent 主 Agent 在发起或回收本执行体前，必须优先读取 `npx --no-install bmad-speckit main-agent-orchestration --cwd {project-root} --action inspect|dispatch-plan`

## Repo Add-ons

- 本仓 handoff / state 协议
- `runAuditorHost`（auditor 执行后的唯一标准自动化入口）
- 本仓禁止词与模糊表述约束
- 本仓执行可见性增强要求
- BUGFIX / RCA 相关产物路径与审计报告路径约定

## Stage 调用前 CLI 输出要求

- 执行体名称
- 输入参数
- 提示词结构摘要
- 预期产物
- RCA / BUGFIX / 审计 / 修复 / post-audit 闭环摘要

## Use Cases

- Bug 报告 → RCA → 修复
- 回归问题处理
- 生产问题紧急修复

## Main Agent Responsibilities

- 解析 bug 描述与 RCA 输入
- 生成或更新 BUGFIX 文档路径
- 在进入修复实现前调用 `auditor-bugfix`
- 在 `auditor-bugfix` PASS 后，必须由 invoking host/runner 调用 `runAuditorHost`
- 在修复完成后调用 `auditor-implement`
- 在 `auditor-implement` PASS 后，必须由 invoking host/runner 调用 `runAuditorHost`
- 仅通过 `bmad-master` 进入 commit gate
- 主 Agent 不得直接编辑生产代码或测试代码

## Execution Flow

1. Read `.codex/protocols/audit-result-schema.md`
2. Read `_bmad-output/runtime/context/project.json`
3. 分析 bug 描述并完成 Root Cause Analysis
4. 生成 BUGFIX 文档
5. 调用 `auditor-bugfix` 审计 BUGFIX 文档
6. `auditor-bugfix` PASS 后，由 invoking host/runner 调用 `runAuditorHost`
7. 通过后先写复现测试，再执行修复实现（含 TDD）
8. 调用 `auditor-implement` 进行实施后审计
9. `auditor-implement` PASS 后，由 invoking host/runner 调用 `runAuditorHost`
10. PASS 后向 `bmad-master` 返回提交门控请求

## Implementation Prompt Requirements

- 主 Agent 调用执行体时，必须完整复制 Codex 侧 bug assistant / bugfix workflow 的对应正文模板，不得摘要化
- 不得只传文件路径让执行体自行推断规则
- parent 主 Agent 不得只根据 `mainAgentNextAction / mainAgentReady` 派发本执行体；若 repo-native orchestration surface 可用，必须优先消费该 surface
- 必须显式传入：
  - bug 描述
  - RCA 摘要或 RCA 文档路径
  - BUGFIX 文档路径
  - TDD 约束
  - `auditor-bugfix` → `auditor-implement` → `bmad-master` 的门控要求

## Output / Handoff

```yaml
execution_summary:
  status: passed|failed
  stage: bugfix_flow
artifacts:
  rca: rca/.../rca.md
  bugfix: fix/.../fix.md
  repro_test: tests/.../bugfix.test.ts
handoff:
  next_action: implement_bugfix|post_audit|commit_gate|revise_bugfix_doc
  next_agent: bmad-bug-agent|auditor-implement|bmad-master|auditor-bugfix
  ready: true|false
  mainAgentNextAction: dispatch_implement|dispatch_review|dispatch_remediation|run_closeout|await_user
  mainAgentReady: true|false
```

说明：这里的 `next_agent`、`mainAgentNextAction`、`mainAgentReady` 只作为 compatibility hint。bugfix 子执行体返回后，主 Agent 必须重新读取 `main-agent-orchestration` surface，再决定下一条全局分支。

## State Updates

```yaml
layer: bugfix
stage: fix_passed
bug_id: string
root_cause_status: identified | fixed
artifacts:
  rca: rca/.../rca.md
  fix: fix/.../fix.md
```

## Constraints

- **禁止自行 commit**
- 必须通过 bugfix 阶段审计（采用 Codex Canonical Base / Codex no-hooks Runtime Adapter / Repo Add-ons 三层结构）
- 必须先写复现测试，再写修复实现
- 必须经过实施后审计
- 必须经过 Master 门控
"""
